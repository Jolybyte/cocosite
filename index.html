<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CyberVision | Объекты в реальном времени</title>
    <!-- Иконки из фреймворка (Font Awesome 6 Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- TensorFlow.js и модель COCO-SSD (мощная, готовая детекция объектов) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* улучшает тактильный опыт, но текст копировать можно */
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #010101);
            font-family: 'Segoe UI', 'Orbitron', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* Киберпанк-минимализм: неон, сетка, тонкие рамки */
        .cyber-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: rgba(8, 12, 25, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.35);
            border-radius: 32px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2), inset 0 0 15px rgba(0, 255, 255, 0.05);
            padding: 20px 18px 28px;
            transition: all 0.2s ease;
        }

        /* Заголовок с глитч-эффектом */
        .header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 1px solid cyan;
            padding-bottom: 12px;
        }
        .title {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px #0ff8;
        }
        .badge {
            background: #000000aa;
            border: 1px solid #0ff;
            border-radius: 60px;
            padding: 6px 14px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #0ff;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        .badge i {
            margin-right: 6px;
            font-size: 0.75rem;
        }

        /* зона вебки */
        .camera-area {
            position: relative;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 0 2px #000, 0 0 0 5px rgba(0, 255, 255, 0.3);
            background: #000000;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        video {
            z-index: 1;
            filter: brightness(1.02) contrast(1.05);
        }
        canvas {
            z-index: 2;
        }
        .camera-placeholder {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: repeating-linear-gradient(45deg, #0a0f1a 0px, #0a0f1a 20px, #11161f 20px, #11161f 40px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: cyan;
            font-size: 1rem;
            gap: 12px;
            text-align: center;
        }
        .camera-placeholder i {
            font-size: 3rem;
            opacity: 0.7;
        }

        /* панель управления и инфо */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin-top: 16px;
            margin-bottom: 20px;
        }
        .cyber-btn {
            background: rgba(0, 20, 30, 0.8);
            border: 1.5px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            border-radius: 48px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
            letter-spacing: 1px;
        }
        .cyber-btn i {
            font-size: 1.2rem;
        }
        .cyber-btn:active {
            transform: scale(0.96);
            background: #0ff22a20;
            box-shadow: 0 0 12px cyan;
        }
        .cyber-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
            border-color: gray;
        }
        .status-panel {
            background: #03060eaa;
            border-left: 6px solid #0ff;
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            color: #b0f0ff;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .fps-counter, .obj-count {
            background: #00000066;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .detection-list {
            background: rgba(0, 0, 0, 0.65);
            border-radius: 24px;
            padding: 12px 16px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid cyan;
            box-shadow: inset 0 0 5px #0ff1, 0 4px 10px #000;
        }
        .detection-list h4 {
            color: #0ff;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .list-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .detect-tag {
            background: #000b10;
            border: 1px solid #0ff;
            border-radius: 36px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #0ff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(2px);
            transition: 0.1s linear;
            font-family: monospace;
        }
        .detect-tag i {
            font-size: 0.75rem;
            color: #f0f;
        }
        .confidence {
            color: #f0a6ff;
            font-size: 0.7rem;
        }
        .footer-note {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 18px;
            color: cyan;
            opacity: 0.6;
        }
        @media (max-width: 600px) {
            .cyber-container {
                padding: 14px;
            }
            .title {
                font-size: 1.3rem;
            }
            .cyber-btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
            .detect-tag {
                padding: 4px 12px;
                font-size: 0.7rem;
            }
            .status-panel {
                font-size: 0.7rem;
            }
        }
        /* скролл кибер-стиль */
        .detection-list::-webkit-scrollbar {
            width: 5px;
        }
        .detection-list::-webkit-scrollbar-track {
            background: #0a0f1a;
        }
        .detection-list::-webkit-scrollbar-thumb {
            background: cyan;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="cyber-container">
    <div class="header">
        <div class="title">
            <i class="fas fa-microchip"></i> CYBER·VISION
        </div>
        <div class="badge">
            <i class="fas fa-brain"></i> COCO-SSD v1.1
        </div>
    </div>

    <div class="camera-area" id="cameraWrapper">
        <div id="placeholder" class="camera-placeholder">
            <i class="fas fa-camera-retro"></i>
            <span>Ожидание доступа к камере</span>
            <i class="fas fa-arrow-down"></i>
        </div>
        <video id="webcam" autoplay playsinline muted style="display: none;"></video>
        <canvas id="overlayCanvas" style="display: none;"></canvas>
    </div>

    <div class="controls">
        <button id="startBtn" class="cyber-btn"><i class="fas fa-play-circle"></i> Активировать</button>
        <button id="stopBtn" class="cyber-btn disabled"><i class="fas fa-stop-circle"></i> Деактивировать</button>
    </div>

    <div class="status-panel">
        <div class="fps-counter"><i class="fas fa-tachometer-alt"></i> <span id="fpsValue">--</span> FPS</div>
        <div class="obj-count"><i class="fas fa-cubes"></i> Объектов: <span id="objectCount">0</span></div>
        <div><i class="fas fa-eye"></i> Модель: <span id="modelStatus">загрузка...</span></div>
    </div>

    <div class="detection-list">
        <h4><i class="fas fa-list-ul"></i> РАСПОЗНАННЫЕ ОБЪЕКТЫ</h4>
        <div id="detectionsContainer" class="list-items">
            <div class="detect-tag" style="opacity:0.6;"><i class="fas fa-dot-circle"></i> Ожидание детекции...</div>
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-shield-alt"></i> Мощная модель COCO-SSD | 90 классов | Киберпанк-аналитика
    </div>
</div>

<script>
    // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
    let model = null;           // загруженная coco-ssd модель
    let isModelReady = false;
    let isStreaming = false;
    let stream = null;
    let animationId = null;
    let lastTimestamp = 0;
    let frameCount = 0;
    let fps = 0;
    
    // DOM элементы
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlayCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const placeholderDiv = document.getElementById('placeholder');
    const cameraWrapper = document.getElementById('cameraWrapper');
    const fpsSpan = document.getElementById('fpsValue');
    const objectCountSpan = document.getElementById('objectCount');
    const modelStatusSpan = document.getElementById('modelStatus');
    const detectionsContainer = document.getElementById('detectionsContainer');
    
    // размеры канваса (подстраивается под видео)
    function resizeCanvasToVideo() {
        if (video.videoWidth && video.videoHeight) {
            const w = video.videoWidth;
            const h = video.videoHeight;
            canvas.width = w;
            canvas.height = h;
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            // синхронизируем абсолютное позиционирование, размеры через css aspect уже заданы
        }
    }
    
    // Загрузка модели COCO-SSD (мощная нейронная сеть для детекции 80+ классов)
    async function loadModel() {
        modelStatusSpan.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> загрузка...';
        try {
            // COCO-SSD от TensorFlow - одна из самых мощных моделей для браузера
            model = await cocoSsd.load({
                base: 'mobilenet_v2',  // версия с хорошим балансом скорость/точность (но мощная)
                modelUrl: undefined
            });
            isModelReady = true;
            modelStatusSpan.innerHTML = '<i class="fas fa-check-circle"></i> активна (COCO)';
            console.log('Модель COCO-SSD загружена');
        } catch (err) {
            console.error('Ошибка загрузки модели:', err);
            modelStatusSpan.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ошибка модели';
            isModelReady = false;
        }
    }
    
    // Функция детекции и отрисовки рамок
    async function detectAndDraw() {
        if (!isStreaming || !model || !video.videoWidth || video.paused || video.ended) {
            return;
        }
        
        try {
            // Выполняем детекцию объектов на текущем кадре
            const predictions = await model.detect(video);
            
            // Обновляем счетчик объектов
            const objCount = predictions.length;
            objectCountSpan.innerText = objCount;
            
            // Очищаем канвас перед рисованием
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Рисуем кибер-рамки вокруг объектов
            predictions.forEach(pred => {
                const [x, y, width, height] = pred.bbox;
                const className = pred.class;
                const score = Math.round(pred.score * 100);
                
                // Стиль киберпанк: неоновые обводки, углы, текст
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 0;
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.strokeRect(x, y, width, height);
                
                // Добавляем "лазерные" углы
                ctx.beginPath();
                ctx.moveTo(x, y + 8);
                ctx.lineTo(x, y);
                ctx.lineTo(x + 8, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x + width - 8, y);
                ctx.lineTo(x + width, y);
                ctx.lineTo(x + width, y + 8);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x + width, y + height - 8);
                ctx.lineTo(x + width, y + height);
                ctx.lineTo(x + width - 8, y + height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x + 8, y + height);
                ctx.lineTo(x, y + height);
                ctx.lineTo(x, y + height - 8);
                ctx.stroke();
                
                // Фон для текста
                ctx.font = 'bold 16px "Courier New", monospace';
                const textWidth = ctx.measureText(`${className} ${score}%`).width;
                ctx.fillStyle = '#000000aa';
                ctx.fillRect(x, y - 24, textWidth + 12, 22);
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 14px monospace';
                ctx.shadowBlur = 0;
                ctx.fillText(`${className} ${score}%`, x + 4, y - 8);
                
                // дополнительный неоновый глитч-эффект (точки)
                ctx.fillStyle = '#f0f';
                ctx.font = 'bold 10px monospace';
                ctx.fillText(`⚡`, x + width - 12, y + height - 4);
            });
            
            // Обновляем список объектов в UI (киберпанк список)
            updateDetectionList(predictions);
            
        } catch (err) {
            console.warn("Ошибка детекции:", err);
        }
    }
    
    // Обновление блока со списком объектов (иконки фреймворка)
    function updateDetectionList(predictions) {
        if (!detectionsContainer) return;
        if (!predictions || predictions.length === 0) {
            detectionsContainer.innerHTML = `<div class="detect-tag" style="opacity:0.6;"><i class="fas fa-ghost"></i> Нет объектов</div>`;
            return;
        }
        // Создаем уникальные элементы для каждого обнаруженного объекта (макс 15 для читаемости)
        const items = predictions.slice(0, 15).map(pred => {
            const confidencePercent = Math.round(pred.score * 100);
            let icon = 'fa-question-circle';
            // подбираем иконку на основе класса для атмосферы
            const cls = pred.class.toLowerCase();
            if (cls.includes('person')) icon = 'fa-user-astronaut';
            else if (cls.includes('cell phone') || cls.includes('phone')) icon = 'fa-mobile-alt';
            else if (cls.includes('laptop') || cls.includes('computer')) icon = 'fa-laptop-code';
            else if (cls.includes('tv')) icon = 'fa-tv';
            else if (cls.includes('car')) icon = 'fa-car-side';
            else if (cls.includes('bicycle')) icon = 'fa-bicycle';
            else if (cls.includes('dog')) icon = 'fa-dog';
            else if (cls.includes('cat')) icon = 'fa-cat';
            else if (cls.includes('bottle')) icon = 'fa-wine-bottle';
            else if (cls.includes('chair')) icon = 'fa-chair';
            else if (cls.includes('book')) icon = 'fa-book';
            else icon = 'fa-microchip';
            
            return `<div class="detect-tag"><i class="fas ${icon}"></i> ${pred.class} <span class="confidence">${confidencePercent}%</span></div>`;
        }).join('');
        detectionsContainer.innerHTML = items;
    }
    
    // Цикл анимации (запрос кадров)
    function renderLoop(timestamp) {
        if (!isStreaming) return;
        
        // расчет FPS
        frameCount++;
        if (timestamp - lastTimestamp >= 1000) {
            fps = frameCount;
            fpsSpan.innerText = fps;
            frameCount = 0;
            lastTimestamp = timestamp;
        }
        
        // если видео готово и модель активна — выполняем детекцию
        if (video.readyState === 4 && isModelReady && model && video.videoWidth > 0) {
            // для производительности на мобильных устройствах throttle не требуется, но coco-ssd достаточно быстра
            detectAndDraw();
        } else if (video.readyState < 2) {
            // ничего
        }
        
        animationId = requestAnimationFrame(renderLoop);
    }
    
    // Запуск камеры и инициализация
    async function startCamera() {
        if (isStreaming) {
            // уже активно
            return;
        }
        if (!isModelReady) {
            alert("Модель ещё не загружена, подождите секунду...");
            return;
        }
        
        try {
            // Запрашиваем доступ к веб-камере (с поддержкой мобильных)
            const mediaStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            stream = mediaStream;
            video.srcObject = stream;
            video.style.display = 'block';
            canvas.style.display = 'block';
            placeholderDiv.style.display = 'none';
            await video.play();
            isStreaming = true;
            
            // После того как видео начало играть, подстраиваем размер канваса
            video.addEventListener('loadedmetadata', () => {
                resizeCanvasToVideo();
            });
            resizeCanvasToVideo(); // дополнительно
            
            // Обновляем UI кнопок
            startBtn.classList.add('disabled');
            stopBtn.classList.remove('disabled');
            
            // запускаем цикл детекции если ещё не запущен
            if (animationId === null) {
                lastTimestamp = performance.now();
                frameCount = 0;
                animationId = requestAnimationFrame(renderLoop);
            }
        } catch (err) {
            console.error("Ошибка доступа к камере:", err);
            alert("Не удалось получить доступ к камере. Проверьте разрешения.\n" + (err.message || ""));
            // возвращаем интерфейс в исходное состояние
            video.style.display = 'none';
            canvas.style.display = 'none';
            placeholderDiv.style.display = 'flex';
            startBtn.classList.remove('disabled');
            stopBtn.classList.add('disabled');
            isStreaming = false;
        }
    }
    
    // Остановка камеры и очистка
    function stopCamera() {
        if (!isStreaming) return;
        
        // остановить все треки
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        video.srcObject = null;
        video.style.display = 'none';
        canvas.style.display = 'none';
        placeholderDiv.style.display = 'flex';
        isStreaming = false;
        
        // очищаем канвас
        if (ctx) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        // сброс списка объектов
        detectionsContainer.innerHTML = `<div class="detect-tag" style="opacity:0.6;"><i class="fas fa-dot-circle"></i> Ожидание детекции...</div>`;
        objectCountSpan.innerText = '0';
        fpsSpan.innerText = '--';
        
        // обновляем кнопки
        startBtn.classList.remove('disabled');
        stopBtn.classList.add('disabled');
    }
    
    // Полная остановка цикла при отключении, перестраховка
    function fullStop() {
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        stopCamera();
    }
    
    // Инициализация при загрузке страницы: загружаем модель, слушатели
    async function init() {
        await loadModel();
        
        // слушатели кнопок
        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', () => {
            if (isStreaming) stopCamera();
        });
        
        // дополнительно: при уходе со страницы освобождаем камеру
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            if (animationId) cancelAnimationFrame(animationId);
        });
        
        // автоподстройка canvas при изменении размера экрана (ресайз видео)
        window.addEventListener('resize', () => {
            if (video.videoWidth) {
                resizeCanvasToVideo();
            }
        });
    }
    
    // запуск инициализации
    init();
</script>
</body>
</html>
