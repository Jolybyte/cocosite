<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Обнаружение объектов · COCO-SSD</title>
  <!-- Минималистичный стиль, адаптивный, тёмная тема -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #0b0b0b;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
    }

    /* Зона камеры — занимает всё пространство */
    .camera-container {
      flex: 1;
      position: relative;
      width: 100%;
      background: #050505;
      overflow: hidden;
      border-radius: 0;
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;  /* заполнение без искажений пропорций */
      display: block;
    }

    canvas {
      pointer-events: none;  /* чтобы не мешал нажатиям */
      z-index: 10;
    }

    /* Панель управления — минимализм */
    .controls {
      padding: 16px 20px 20px;
      background: #0f0f0f;
      border-top: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 20;
    }

    .status-area {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 450;
      letter-spacing: 0.3px;
      color: #ccc;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 10px;
      background: #3a3a3a;
      transition: background 0.2s;
    }

    .dot.active {
      background: #ff3b30;  /* красный индикатор работы */
      box-shadow: 0 0 8px rgba(255, 59, 48, 0.6);
    }

    .dot.loading {
      background: #f39c12;
    }

    button {
      background: #1c1c1e;
      border: 0.5px solid #3a3a3c;
      color: #ffffff;
      font-size: 15px;
      font-weight: 480;
      padding: 12px 22px;
      border-radius: 40px;
      cursor: pointer;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      min-width: 110px;
      text-align: center;
    }

    button:active {
      background: #2c2c2e;
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.4;
      pointer-events: none;
      filter: grayscale(0.5);
    }

    /* Текст подсказки — минимализм */
    .hint {
      font-size: 13px;
      color: #888;
      padding-right: 6px;
      white-space: nowrap;
    }

    /* Оверлей загрузки модели */
    .loader-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #0b0b0b;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    .loader-message {
      background: rgba(20,20,22,0.9);
      padding: 20px 32px;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 400;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 0.5px solid #3a3a3c;
      color: #eee;
      letter-spacing: 0.5px;
    }

    /* Для мобильных — убираем лишние отступы */
    @media (max-width: 480px) {
      .controls {
        padding: 14px 16px 18px;
      }
      button {
        padding: 12px 16px;
        font-size: 14px;
      }
      .hint {
        display: none; /* на очень маленьких экранах скрываем подсказку */
      }
    }

    /* Стиль рамок и текста рисуется через canvas — красный */
  </style>
  <!-- Подключаем TensorFlow.js и модель COCO-SSD (мощная) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
</head>
<body>
<div class="app">
  <!-- Оверлей загрузки (исчезнет после загрузки модели) -->
  <div class="loader-overlay" id="loaderOverlay">
    <div class="loader-message">Загрузка модели COCO-SSD…</div>
  </div>

  <div class="camera-container">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div class="controls">
    <div class="status-area">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Ожидание</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <span class="hint" id="objectsCount">—</span>
      <button id="toggleCameraBtn">▶ Включить</button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- DOM элементы ----------
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const toggleBtn = document.getElementById('toggleCameraBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const objectsCountSpan = document.getElementById('objectsCount');
    const loaderOverlay = document.getElementById('loaderOverlay');

    // ---------- Состояния ----------
    let model = null;
    let stream = null;
    let isDetecting = false;
    let detectionFrameId = null;
    let lastDetectionTime = 0;
    const DETECTION_INTERVAL_MS = 120; // оптимизация для плавности на смартфонах
    
    // Настройки камеры: задняя камера (environment) для определения объектов
    const constraints = {
      video: {
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    };

    // ---------- Обновление UI статуса ----------
    function setStatus(type, message) {
      statusText.textContent = message;
      statusDot.className = 'dot';
      if (type === 'active') {
        statusDot.classList.add('active');
      } else if (type === 'loading') {
        statusDot.classList.add('loading');
      } else {
        // неактивный
      }
    }

    // ---------- Скрыть лоадер ----------
    function hideLoader() {
      if (loaderOverlay) {
        loaderOverlay.style.opacity = '0';
        setTimeout(() => {
          loaderOverlay.style.display = 'none';
        }, 400);
      }
    }

    // ---------- Загрузка модели COCO-SSD ----------
    async function loadModel() {
      setStatus('loading', 'Загрузка модели...');
      try {
        // Используем мощную модель (по умолчанию mobilenet_v2, можно lite_mobilenet_v2)
        // но оставляем базовый вызов — он использует достаточно точную модель.
        model = await cocoSsd.load();
        setStatus('', 'Модель готова');
        console.log('COCO-SSD модель загружена');
        hideLoader();
        // После загрузки модели кнопка становится активной
        toggleBtn.disabled = false;
        toggleBtn.textContent = '▶ Включить';
        statusDot.classList.remove('loading');
        statusDot.classList.add('active'); // готова к работе
        setStatus('active', 'Готово к запуску');
        return true;
      } catch (err) {
        console.error('Ошибка загрузки модели:', err);
        setStatus('', 'Ошибка модели');
        statusDot.classList.remove('loading');
        statusDot.style.background = '#ff3b30';
        statusText.textContent = 'Ошибка загрузки';
        toggleBtn.disabled = true;
        hideLoader();
        alert('Не удалось загрузить модель COCO-SSD. Обновите страницу.');
        return false;
      }
    }

    // ---------- Остановка камеры и детекции ----------
    function stopCameraAndDetection() {
      // Останавливаем цикл детекции
      if (detectionFrameId) {
        cancelAnimationFrame(detectionFrameId);
        detectionFrameId = null;
      }
      isDetecting = false;
      
      // Останавливаем все дорожки видео
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      
      // Очищаем video srcObject
      if (video.srcObject) {
        video.srcObject = null;
      }
      
      // Очищаем canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      objectsCountSpan.textContent = '—';
      
      setStatus('', 'Камера выключена');
      statusDot.classList.remove('active');
    }

    // ---------- Запуск камеры ----------
    async function startCamera() {
      try {
        setStatus('loading', 'Доступ к камере...');
        statusDot.classList.add('loading');
        
        // Запрашиваем разрешение камеры
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        // Ждём, когда видео начнёт воспроизводиться
        await new Promise((resolve) => {
          video.onloadedmetadata = () => {
            video.play().then(resolve).catch((e) => {
              console.warn('Автовоспроизведение:', e);
              resolve(); // всё равно продолжаем
            });
          };
        });
        
        // Устанавливаем размеры canvas под реальное разрешение видео
        const videoWidth = video.videoWidth;
        const videoHeight = video.videoHeight;
        canvas.width = videoWidth;
        canvas.height = videoHeight;
        
        setStatus('active', 'Камера активна');
        statusDot.classList.add('active');
        statusDot.classList.remove('loading');
        
        toggleBtn.textContent = '■ Остановить';
        objectsCountSpan.textContent = '0 объектов';
        
        // Запускаем цикл детекции
        isDetecting = true;
        detectionLoop();
        
        return true;
      } catch (err) {
        console.error('Ошибка доступа к камере:', err);
        setStatus('', 'Нет доступа');
        statusDot.classList.remove('loading', 'active');
        statusText.textContent = 'Ошибка камеры';
        toggleBtn.textContent = '↻ Повторить';
        alert('Не удалось получить доступ к камере. Проверьте разрешения.');
        return false;
      }
    }

    // ---------- Цикл обнаружения объектов (с throttling) ----------
    function detectionLoop() {
      if (!isDetecting) return;
      
      const now = performance.now();
      
      // Проверяем, готовы ли видео и модель
      if (video.readyState === 4 && model) {
        // Ограничиваем частоту детекции для производительности
        if (now - lastDetectionTime > DETECTION_INTERVAL_MS) {
          lastDetectionTime = now;
          
          // Запускаем детекцию
          model.detect(video).then(predictions => {
            if (!isDetecting) return; // если вдруг остановили во время промиса
            
            // Отрисовываем кадр из видео (очищаем и рисуем текущее изображение)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Рисуем видео-кадр на canvas (чтобы рамки были поверх картинки)
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Рисуем красные рамки и текст
            ctx.font = 'bold 16px "Inter", -apple-system, sans-serif';
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#ff2a2a'; // ярко-красный
            ctx.fillStyle = '#ff2a2a';
            ctx.shadowColor = '#00000080';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 1;
            
            predictions.forEach(pred => {
              const [x, y, width, height] = pred.bbox;
              const text = `${pred.class} (${Math.round(pred.score * 100)}%)`;
              
              // Рамка
              ctx.strokeRect(x, y, width, height);
              
              // Фон для текста (полупрозрачный красный)
              ctx.fillStyle = '#ff2a2a';
              ctx.shadowBlur = 6;
              const textWidth = ctx.measureText(text).width;
              const textHeight = 22;
              ctx.fillRect(x, y - textHeight - 4, textWidth + 12, textHeight + 4);
              
              // Текст белый
              ctx.fillStyle = '#ffffff';
              ctx.shadowBlur = 6;
              ctx.font = 'bold 15px "Inter", -apple-system, sans-serif';
              ctx.fillText(text, x + 6, y - 8);
            });
            
            // Сбрасываем тень, чтобы не мешала следующим кадрам
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            // Обновляем счётчик объектов
            const count = predictions.length;
            objectsCountSpan.textContent = `${count} объект${getPlural(count)}`;
          }).catch(err => {
            console.warn('Ошибка детекции:', err);
          });
        }
      }
      
      // Продолжаем цикл
      detectionFrameId = requestAnimationFrame(detectionLoop);
    }

    // Вспомогательная функция для склонения
    function getPlural(n) {
      const mod10 = n % 10;
      const mod100 = n % 100;
      if (mod10 === 1 && mod100 !== 11) return '';
      else if ([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return 'а';
      else return 'ов';
    }

    // ---------- Обработчик кнопки ВКЛ/ВЫКЛ ----------
    async function onToggleCamera() {
      if (stream) {
        // Если камера активна — выключаем
        stopCameraAndDetection();
        toggleBtn.textContent = '▶ Включить';
        objectsCountSpan.textContent = '—';
      } else {
        // Запускаем камеру
        toggleBtn.disabled = true;   // предотвращаем двойные клики
        toggleBtn.textContent = '...';
        
        const success = await startCamera();
        if (!success) {
          toggleBtn.disabled = false;
          toggleBtn.textContent = '▶ Включить';
        } else {
          toggleBtn.disabled = false;
        }
      }
    }

    // ---------- Инициализация приложения ----------
    async function initApp() {
      // Сначала кнопка заблокирована, пока модель не загрузится
      toggleBtn.disabled = true;
      toggleBtn.textContent = 'Загрузка...';
      setStatus('loading', 'Загрузка модели');
      
      // Загружаем модель
      const modelLoaded = await loadModel();
      if (modelLoaded) {
        toggleBtn.disabled = false;
        toggleBtn.textContent = '▶ Включить';
        setStatus('', 'Готово');
        statusDot.classList.add('active');
      } else {
        toggleBtn.textContent = 'Ошибка';
      }
      
      // Обработчик кнопки
      toggleBtn.addEventListener('click', onToggleCamera);
      
      // Если пользователь уходит со страницы — останавливаем камеру (экономия)
      window.addEventListener('beforeunload', () => {
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
        }
      });
      
      // Для адаптации при изменении ориентации: подгоняем canvas, если размер видео изменился
      // Но обычно video dimensions не меняются. На всякий случай слушаем resize и корректируем.
      window.addEventListener('resize', () => {
        if (video.videoWidth && video.videoHeight) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        }
      });
    }

    // Старт
    initApp();
    
  })();
</script>
</body>
</html>
