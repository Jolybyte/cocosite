<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Обнаружение объектов + Жесты зумирования · COCO-SSD</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      position: relative;
    }

    /* Адаптация для десктопа */
    @media (min-width: 768px) {
      body {
        padding: 20px;
        background: #e8e8e8;
      }
      .app {
        max-width: 800px;
        height: calc(100dvh - 40px);
        border-radius: 32px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      }
    }

    /* Зона камеры — с поддержкой жестов */
    .camera-container {
      flex: 1;
      position: relative;
      width: 100%;
      background: #000;
      overflow: hidden;
      border-radius: 0;
      touch-action: none;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      will-change: transform;
      transition: transform 0.05s ease-out;
      transform-origin: 0 0;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      z-index: 10;
      will-change: transform;
      transition: transform 0.05s ease-out;
      transform-origin: 0 0;
    }

    /* Индикатор зума */
    .zoom-indicator {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 500;
      color: #1a1a1a;
      letter-spacing: 0.3px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      border: 0.5px solid rgba(255,255,255,0.3);
      z-index: 25;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .zoom-indicator.visible {
      opacity: 1;
    }

    /* FPS счетчик (для отладки) */
    .fps-counter {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      color: #0f0;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-family: monospace;
      z-index: 30;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: none;
      opacity: 0.8;
    }

    /* Панель управления */
    .controls {
      padding: 18px 22px 22px;
      background: #ffffff;
      border-top: 1px solid #eaeaea;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 20;
    }

    .status-area {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 450;
      color: #555;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 10px;
      background: #ddd;
      transition: background 0.2s;
    }

    .dot.active {
      background: #ff3b30;
      box-shadow: 0 0 8px rgba(255, 59, 48, 0.25);
    }

    .dot.loading {
      background: #f39c12;
    }

    button {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      color: #1a1a1a;
      font-size: 15px;
      font-weight: 480;
      padding: 12px 24px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      min-width: 120px;
      text-align: center;
      backdrop-filter: blur(5px);
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      background: #f5f5f5;
      transform: scale(0.97);
      border-color: #ccc;
    }

    button:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .hint {
      font-size: 14px;
      color: #888;
      white-space: nowrap;
    }

    .reset-zoom-btn {
      background: #f0f0f0;
      border: 1px solid #ddd;
      padding: 10px 18px;
      margin-left: 8px;
      min-width: auto;
      font-size: 15px;
    }

    /* Загрузка модели */
    .loader-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    
    .loader-message {
      background: rgba(255,255,255,0.95);
      padding: 22px 36px;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 420;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 0.5px solid #ddd;
      color: #333;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.06);
    }

    /* Адаптация */
    @media (max-width: 480px) {
      .controls {
        padding: 14px 16px 18px;
      }
      button {
        padding: 12px 18px;
        font-size: 14px;
      }
      .hint {
        display: none;
      }
      .reset-zoom-btn {
        padding: 10px 14px;
      }
      .fps-counter {
        top: 12px;
        right: 12px;
        padding: 4px 10px;
        font-size: 11px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
</head>
<body>
<div class="app">
  <div class="loader-overlay" id="loaderOverlay">
    <div class="loader-message">Загрузка модели COCO-SSD…</div>
  </div>

  <div class="camera-container" id="cameraContainer">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="fps-counter" id="fpsCounter">FPS: --</div>
    <div class="zoom-indicator" id="zoomIndicator">🔍 1.0x</div>
  </div>

  <div class="controls">
    <div class="status-area">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Ожидание</span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      <span class="hint" id="objectsCount">—</span>
      <button id="resetZoomBtn" class="reset-zoom-btn" title="Сбросить зум">⟲ 1x</button>
      <button id="toggleCameraBtn">▶ Включить</button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- DOM элементы ----------
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const toggleBtn = document.getElementById('toggleCameraBtn');
    const resetZoomBtn = document.getElementById('resetZoomBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const objectsCountSpan = document.getElementById('objectsCount');
    const loaderOverlay = document.getElementById('loaderOverlay');
    const cameraContainer = document.getElementById('cameraContainer');
    const zoomIndicator = document.getElementById('zoomIndicator');
    const fpsCounter = document.getElementById('fpsCounter');

    // ---------- Конфигурация производительности ----------
    const CONFIG = {
      // Детекция
      DETECTION_INTERVAL_MS: 120,        // ~8 fps детекции
      
      // Отрисовка
      MAX_RENDER_FPS: 30,                // Максимальный FPS отрисовки
      MAX_CANVAS_WIDTH: 1280,            // Ограничение размера канваса
      MAX_CANVAS_HEIGHT: 720,
      
      // Зум
      MIN_ZOOM: 1.0,
      MAX_ZOOM: 4.0,
      
      // Камера
      VIDEO_WIDTH: { ideal: 1280 },      // Баланс качество/производительность
      VIDEO_HEIGHT: { ideal: 720 }
    };

    // ---------- Состояния ----------
    let model = null;
    let stream = null;
    let isDetecting = false;
    let detectionFrameId = null;
    let renderFrameId = null;
    let lastDetectionTime = 0;
    let lastRenderTime = 0;
    let isRenderScheduled = false;
    
    // Кэшированные предсказания для отрисовки
    let lastPredictions = [];
    
    // Переменные для зума
    let currentZoom = 1.0;
    let initialDistance = 0;
    let initialZoom = 1.0;
    let zoomIndicatorTimeout = null;
    let transformOriginX = 0.5;
    let transformOriginY = 0.5;
    
    // FPS счетчик
    let fpsFrameCount = 0;
    let fpsLastTime = performance.now();
    let currentFPS = 0;
    
    // Флаг готовности видео
    let isVideoReady = false;

    // Настройки камеры
    const constraints = {
      video: {
        facingMode: 'environment',
        width: CONFIG.VIDEO_WIDTH,
        height: CONFIG.VIDEO_HEIGHT
      },
      audio: false
    };

    // ---------- Обновление UI статуса ----------
    function setStatus(type, message) {
      statusText.textContent = message;
      statusDot.className = 'dot';
      if (type === 'active') statusDot.classList.add('active');
      else if (type === 'loading') statusDot.classList.add('loading');
    }

    function hideLoader() {
      if (loaderOverlay) {
        loaderOverlay.style.opacity = '0';
        setTimeout(() => loaderOverlay.style.display = 'none', 400);
      }
    }

    // ---------- Управление зумом (оптимизированное) ----------
    function applyZoom(zoomValue, originX = null, originY = null) {
      zoomValue = Math.min(CONFIG.MAX_ZOOM, Math.max(CONFIG.MIN_ZOOM, zoomValue));
      currentZoom = zoomValue;
      
      // Устанавливаем точку трансформации если передана
      if (originX !== null && originY !== null) {
        transformOriginX = originX;
        transformOriginY = originY;
        const containerRect = cameraContainer.getBoundingClientRect();
        const originXPx = originX * containerRect.width;
        const originYPx = originY * containerRect.height;
        video.style.transformOrigin = `${originXPx}px ${originYPx}px`;
        canvas.style.transformOrigin = `${originXPx}px ${originYPx}px`;
      }
      
      // Применяем трансформацию через requestAnimationFrame
      requestAnimationFrame(() => {
        video.style.transform = `scale(${currentZoom})`;
        canvas.style.transform = `scale(${currentZoom})`;
      });
      
      // Показываем индикатор
      zoomIndicator.textContent = `🔍 ${currentZoom.toFixed(1)}x`;
      zoomIndicator.classList.add('visible');
      
      if (zoomIndicatorTimeout) clearTimeout(zoomIndicatorTimeout);
      zoomIndicatorTimeout = setTimeout(() => {
        zoomIndicator.classList.remove('visible');
      }, 1500);
    }

    function resetZoom() {
      transformOriginX = 0.5;
      transformOriginY = 0.5;
      const containerRect = cameraContainer.getBoundingClientRect();
      video.style.transformOrigin = 'center center';
      canvas.style.transformOrigin = 'center center';
      applyZoom(1.0);
    }

    // ---------- Обработчики жестов (улучшенные) ----------
    function getTouchCenter(touches) {
      const rect = cameraContainer.getBoundingClientRect();
      const centerX = (touches[0].clientX + touches[1].clientX) / 2 - rect.left;
      const centerY = (touches[0].clientY + touches[1].clientY) / 2 - rect.top;
      return {
        x: Math.max(0, Math.min(1, centerX / rect.width)),
        y: Math.max(0, Math.min(1, centerY / rect.height))
      };
    }

    function handleTouchStart(e) {
      if (!stream) return;
      
      const touches = e.touches;
      if (touches.length === 2) {
        e.preventDefault();
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        initialDistance = Math.sqrt(dx * dx + dy * dy);
        initialZoom = currentZoom;
        
        const center = getTouchCenter(touches);
        transformOriginX = center.x;
        transformOriginY = center.y;
      }
    }

    function handleTouchMove(e) {
      if (!stream) return;
      
      const touches = e.touches;
      if (touches.length === 2) {
        e.preventDefault();
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (initialDistance > 0) {
          const scale = distance / initialDistance;
          const newZoom = initialZoom * scale;
          const center = getTouchCenter(touches);
          applyZoom(newZoom, center.x, center.y);
        }
      }
    }

    function handleTouchEnd(e) {
      if (!stream) return;
      initialDistance = 0;
    }

    // ---------- FPS Счетчик ----------
    function updateFPSCounter(now) {
      fpsFrameCount++;
      
      if (now - fpsLastTime >= 1000) {
        currentFPS = fpsFrameCount;
        fpsCounter.textContent = `FPS: ${currentFPS}`;
        fpsFrameCount = 0;
        fpsLastTime = now;
        
        // Цветовая индикация
        if (currentFPS >= 25) {
          fpsCounter.style.color = '#0f0';
        } else if (currentFPS >= 15) {
          fpsCounter.style.color = '#ff0';
        } else {
          fpsCounter.style.color = '#f00';
        }
      }
    }

    // ---------- Оптимизированная отрисовка ----------
    function renderVideoFrame(now) {
      if (!isDetecting || !isVideoReady) return;
      
      // Планируем следующий кадр
      renderFrameId = requestAnimationFrame(renderVideoFrame);
      
      // Ограничение FPS
      if (now - lastRenderTime < (1000 / CONFIG.MAX_RENDER_FPS)) {
        return;
      }
      
      lastRenderTime = now;
      updateFPSCounter(now);
      
      // Вычисляем оптимальный размер канваса
      const targetWidth = Math.min(video.videoWidth, CONFIG.MAX_CANVAS_WIDTH);
      const targetHeight = Math.min(video.videoHeight, CONFIG.MAX_CANVAS_HEIGHT);
      
      // Обновляем размер канваса только при необходимости
      if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
        canvas.width = targetWidth;
        canvas.height = targetHeight;
      }
      
      // Масштабируем видео при отрисовке
      const scaleX = canvas.width / video.videoWidth;
      const scaleY = canvas.height / video.videoHeight;
      
      // Очищаем и рисуем видео
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      // Рисуем последние известные предсказания
      if (lastPredictions.length > 0) {
        ctx.font = 'bold 16px "Inter", -apple-system, sans-serif';
        ctx.lineWidth = 3.5;
        ctx.strokeStyle = '#ff2a2a';
        ctx.fillStyle = '#ff2a2a';
        ctx.shadowColor = '#00000040';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        
        lastPredictions.forEach(pred => {
          // Масштабируем координаты
          const [x, y, width, height] = pred.bbox;
          const scaledX = x * scaleX;
          const scaledY = y * scaleY;
          const scaledWidth = width * scaleX;
          const scaledHeight = height * scaleY;
          
          const text = `${pred.class} (${Math.round(pred.score * 100)}%)`;
          
          // Рамка
          ctx.strokeRect(scaledX, scaledY, scaledWidth, scaledHeight);
          
          // Фон текста
          ctx.fillStyle = '#ff2a2a';
          const textWidth = ctx.measureText(text).width;
          const textHeight = 22;
          ctx.fillRect(scaledX, scaledY - textHeight - 4, textWidth + 12, textHeight + 4);
          
          // Текст
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 15px "Inter", -apple-system, sans-serif';
          ctx.fillText(text, scaledX + 6, scaledY - 8);
        });
        
        // Сбрасываем тени
        ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
      }
    }

    // ---------- Цикл обнаружения объектов (оптимизированный) ----------
    async function detectionLoop() {
      if (!isDetecting || !isVideoReady) return;
      
      detectionFrameId = requestAnimationFrame(detectionLoop);
      
      const now = performance.now();
      
      if (model && (now - lastDetectionTime) > CONFIG.DETECTION_INTERVAL_MS) {
        lastDetectionTime = now;
        
        try {
          // Модель работает с оригинальным видео
          const predictions = await model.detect(video);
          
          if (isDetecting) {
            lastPredictions = predictions;
            
            // Обновляем счетчик объектов
            const count = predictions.length;
            objectsCountSpan.textContent = `${count} объект${getPlural(count)}`;
          }
        } catch (err) {
          console.warn('Ошибка детекции:', err);
        }
      }
    }

    function getPlural(n) {
      const mod10 = n % 10;
      const mod100 = n % 100;
      if (mod10 === 1 && mod100 !== 11) return '';
      else if ([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return 'а';
      else return 'ов';
    }

    // ---------- Загрузка модели ----------
    async function loadModel() {
      setStatus('loading', 'Загрузка модели...');
      try {
        model = await cocoSsd.load();
        console.log('COCO-SSD модель загружена');
        hideLoader();
        setStatus('active', 'Модель готова');
        toggleBtn.disabled = false;
        toggleBtn.textContent = '▶ Включить';
        return true;
      } catch (err) {
        console.error('Ошибка загрузки модели:', err);
        setStatus('', 'Ошибка модели');
        statusDot.style.background = '#ff3b30';
        statusText.textContent = 'Ошибка загрузки';
        toggleBtn.disabled = true;
        hideLoader();
        alert('Не удалось загрузить модель COCO-SSD.');
        return false;
      }
    }

    // ---------- Остановка камеры ----------
    function stopCameraAndDetection() {
      isDetecting = false;
      isVideoReady = false;
      
      if (detectionFrameId) {
        cancelAnimationFrame(detectionFrameId);
        detectionFrameId = null;
      }
      
      if (renderFrameId) {
        cancelAnimationFrame(renderFrameId);
        renderFrameId = null;
      }
      
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      
      if (video.srcObject) video.srcObject = null;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      lastPredictions = [];
      objectsCountSpan.textContent = '—';
      fpsCounter.textContent = 'FPS: --';
      setStatus('', 'Камера выключена');
      statusDot.classList.remove('active');
      
      resetZoom();
      
      cameraContainer.removeEventListener('touchstart', handleTouchStart);
      cameraContainer.removeEventListener('touchmove', handleTouchMove);
      cameraContainer.removeEventListener('touchend', handleTouchEnd);
    }

    // ---------- Запуск камеры (исправленное ожидание) ----------
    async function startCamera() {
      try {
        setStatus('loading', 'Доступ к камере...');
        statusDot.classList.add('loading');
        
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        // Ждем готовности видео (с учетом уже загруженных метаданных)
        await new Promise((resolve) => {
          if (video.readyState >= 2) {
            resolve();
          } else {
            video.onloadedmetadata = resolve;
          }
        });
        
        // Запускаем воспроизведение
        try {
          await video.play();
        } catch (playErr) {
          console.warn('Автовоспроизведение:', playErr);
          // Пробуем еще раз с взаимодействием пользователя
          await new Promise(res => {
            const playOnTouch = () => {
              video.play().then(res).catch(res);
              document.removeEventListener('touchstart', playOnTouch);
            };
            document.addEventListener('touchstart', playOnTouch, { once: true });
          });
        }
        
        isVideoReady = true;
        
        setStatus('active', 'Камера активна');
        statusDot.classList.add('active');
        statusDot.classList.remove('loading');
        
        toggleBtn.textContent = '■ Остановить';
        objectsCountSpan.textContent = '0 объектов';
        
        // Включаем слушатели жестов
        cameraContainer.addEventListener('touchstart', handleTouchStart, { passive: false });
        cameraContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
        cameraContainer.addEventListener('touchend', handleTouchEnd);
        cameraContainer.addEventListener('touchcancel', handleTouchEnd);
        
        resetZoom();
        
        // Сбрасываем счетчик FPS
        fpsFrameCount = 0;
        fpsLastTime = performance.now();
        
        // Запускаем циклы
        isDetecting = true;
        lastDetectionTime = 0;
        lastRenderTime = 0;
        
        renderFrameId = requestAnimationFrame(renderVideoFrame);
        detectionFrameId = requestAnimationFrame(detectionLoop);
        
        return true;
      } catch (err) {
        console.error('Ошибка доступа к камере:', err);
        setStatus('', 'Нет доступа');
        statusDot.classList.remove('loading', 'active');
        statusText.textContent = 'Ошибка камеры';
        toggleBtn.textContent = '↻ Повторить';
        alert('Не удалось получить доступ к камере.');
        return false;
      }
    }

    // ---------- Обработчик кнопки ВКЛ/ВЫКЛ ----------
    async function onToggleCamera() {
      if (stream) {
        stopCameraAndDetection();
        toggleBtn.textContent = '▶ Включить';
        objectsCountSpan.textContent = '—';
      } else {
        toggleBtn.disabled = true;
        toggleBtn.textContent = '...';
        
        const success = await startCamera();
        if (!success) {
          toggleBtn.disabled = false;
          toggleBtn.textContent = '▶ Включить';
        } else {
          toggleBtn.disabled = false;
        }
      }
    }

    // ---------- Инициализация ----------
    async function initApp() {
      toggleBtn.disabled = true;
      toggleBtn.textContent = 'Загрузка...';
      setStatus('loading', 'Загрузка модели');
      
      const modelLoaded = await loadModel();
      if (modelLoaded) {
        toggleBtn.disabled = false;
        toggleBtn.textContent = '▶ Включить';
        setStatus('active', 'Готово к запуску');
      } else {
        toggleBtn.textContent = 'Ошибка';
      }
      
      toggleBtn.addEventListener('click', onToggleCamera);
      resetZoomBtn.addEventListener('click', resetZoom);
      
      window.addEventListener('beforeunload', () => {
        if (stream) stream.getTracks().forEach(t => t.stop());
      });
    }

    initApp();
  })();
</script>
</body>
</html>
