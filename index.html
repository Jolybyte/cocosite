<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Object Detection | Веб-камера</title>
    <!-- Загрузка TensorFlow.js и модели COCO-SSD (мощная, предобученная на 80+ классах) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* легкое улучшение на мобилках, не мешает */
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 12px;
        }

        /* Минималистичный контейнер — почти без теней, только необходимые отступы */
        .app-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            background: #000000;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
        }

        /* Верхняя строка: только название и индикатор статуса */
        .header {
            padding: 16px 20px;
            background: #000;
            border-bottom: 1px solid #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }

        .title {
            color: #fff;
            font-weight: 500;
            font-size: 1.35rem;
            letter-spacing: -0.3px;
            background: none;
        }

        .status-badge {
            font-size: 0.75rem;
            background: #1a1a1a;
            padding: 6px 12px;
            border-radius: 40px;
            color: #aaa;
            font-weight: 450;
            transition: all 0.2s ease;
        }

        .status-badge.active {
            background: #1f3b2c;
            color: #6feb9a;
            box-shadow: 0 0 0 1px #2a6e46;
        }

        /* Видео-контейнер с камерой */
        .camera-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            aspect-ratio: 4 / 3; /* классическое соотношение, подходит для вебки */
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Зеркальное отображение для естественного ощущения (как в зеркале) */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none; /* чтобы не блокировать доступ к жестам на мобилках */
        }

        /* Минималистичная информационная панель */
        .info-panel {
            padding: 14px 20px;
            background: #000;
            border-top: 1px solid #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #b0b0b0;
            flex-wrap: wrap;
            gap: 12px;
        }

        .counter {
            background: #111;
            padding: 6px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .model-status {
            font-size: 0.7rem;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 8px;
            background-color: #3a3a3a;
            display: inline-block;
        }

        .dot.loaded {
            background-color: #6feb9a;
            box-shadow: 0 0 4px #6feb9a;
        }

        /* Кнопка для инициации камеры (минималистичная) */
        .btn-cam {
            background: #ffffff10;
            backdrop-filter: blur(2px);
            border: 1px solid #2c2c2c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-cam:active {
            background: #2a2a2a;
            transform: scale(0.97);
        }

        /* Для мобильной адаптации: текст чуть меньше, кнопка удобная */
        @media (max-width: 550px) {
            .header {
                padding: 12px 16px;
            }
            .title {
                font-size: 1.2rem;
            }
            .info-panel {
                padding: 12px 16px;
            }
            .btn-cam {
                padding: 6px 14px;
            }
        }

        /* Сообщение если камера не разрешена или ошибка */
        .error-message {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #ffb3b3;
            text-align: center;
            z-index: 20;
            pointer-events: none;
            font-weight: 450;
            border-left: 3px solid #ff5e5e;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="title">🔍 detect</div>
        <div class="status-badge" id="camStatus">⏻ камера неактивна</div>
    </div>

    <div class="camera-wrapper">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="detectionCanvas"></canvas>
    </div>

    <div class="info-panel">
        <div class="counter">
            🧩 объекты: <span id="objectCount">0</span>
        </div>
        <div class="model-status">
            <span class="dot" id="modelDot"></span>
            <span id="modelLabel">загрузка модели...</span>
        </div>
        <button id="enableCamBtn" class="btn-cam">🎥 включить камеру</button>
    </div>
</div>

<script>
    (async function() {
        // ----- Элементы DOM -----
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('detectionCanvas');
        const ctx = canvas.getContext('2d');
        const camStatusSpan = document.getElementById('camStatus');
        const objectCountSpan = document.getElementById('objectCount');
        const modelDot = document.getElementById('modelDot');
        const modelLabelSpan = document.getElementById('modelLabel');
        const enableBtn = document.getElementById('enableCamBtn');
        
        // ----- Глобальные переменные -----
        let model = null;           // модель coco-ssd
        let isModelLoading = true;
        let detectionInterval = null; // интервал обнаружения
        let stream = null;           // медиапоток камеры
        let isCameraActive = false;
        let animationFrameId = null;   // для requestAnimationFrame (если потребуется доп. синхронизация, но интервал проще)
        let lastDetectionTime = 0;
        const DETECTION_FPS = 12;      // ~12 кадров в секунду для производительности и батареи (но достаточно быстро)
        const DETECTION_INTERVAL_MS = 1000 / DETECTION_FPS;
        
        // ---- Настройка canvas под размеры видео ----
        function resizeCanvasToVideo() {
            if (video.videoWidth && video.videoHeight) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.style.width = `${video.videoWidth}px`;
                canvas.style.height = `${video.videoHeight}px`;
                // Синхронизация размера через CSS wrapper уже позаботится о масштабировании,
                // но абсолютные координаты будут рисоваться в координатах canvas (родное разрешение видео)
            } else {
                // fallback: размеры контейнера
                const container = canvas.parentElement;
                const rect = container.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
            }
        }
        
        // ----- Загрузка мощной модели COCO-SSD (MobileNet V2 based) -----
        async function loadDetectionModel() {
            try {
                modelLabelSpan.innerText = 'загрузка COCO-SSD...';
                modelDot.className = 'dot';
                // tf.js бэкенд WebGL ускорит инференс
                await tf.setBackend('webgl');
                await tf.ready();
                // загрузка модели (предобучена на 80 категориях, высокая точность)
                model = await cocoSsd.load({ 
                    base: 'mobilenet_v2',  // мощный баланс скорость/точность
                    modelUrl: undefined     // стандартный url
                });
                isModelLoading = false;
                modelLabelSpan.innerText = 'модель активна (80 классов)';
                modelDot.className = 'dot loaded';
                console.log('✅ Модель COCO-SSD загружена');
                // если камера уже запущена — начинаем детекцию
                if (isCameraActive && video.videoWidth > 0) {
                    startDetectionLoop();
                }
            } catch (err) {
                console.error('Ошибка загрузки модели:', err);
                modelLabelSpan.innerText = 'ошибка модели';
                modelDot.className = 'dot';
                modelDot.style.backgroundColor = '#e34d4d';
            }
        }
        
        // ----- Функция детекции и отрисовки (красная обводка + текст) -----
        async function detectAndDraw() {
            if (!model || !isCameraActive || !video.videoWidth || !video.videoHeight) {
                // Если камера не готова - очищаем canvas
                if (ctx && canvas.width && canvas.height) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
                return;
            }
            
            try {
                // Делаем предсказание на текущем кадре видео
                const predictions = await model.detect(video);
                // Обновляем счетчик объектов
                const count = predictions.length;
                objectCountSpan.innerText = count;
                
                // Рисуем на canvas
                if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                    // синхронизация размеров canvas под исходное видео (важно для координат)
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.style.width = `${video.videoWidth}px`;
                    canvas.style.height = `${video.videoHeight}px`;
                }
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Проходим по всем обнаруженным объектам и рисуем красную обводку + текст
                for (let pred of predictions) {
                    const [x, y, width, height] = pred.bbox;
                    const label = pred.class;
                    const score = Math.round(pred.score * 100);
                    const displayText = `${label} ${score}%`;
                    
                    // Рисуем прямоугольник: красная обводка, толщина 2px, без заливки
                    ctx.beginPath();
                    ctx.strokeStyle = '#ff2a2a';
                    ctx.lineWidth = Math.max(2, Math.min(4, canvas.width / 200)); // адаптивная толщина
                    ctx.setLineDash([]); // сплошная
                    ctx.strokeRect(x, y, width, height);
                    
                    // Дополнительный контрастный фон под текст (полупрозрачный черный)
                    ctx.font = `bold ${Math.max(14, canvas.width / 35)}px "SF Mono", "Monaco", monospace`;
                    const textMetrics = ctx.measureText(displayText);
                    const textWidth = textMetrics.width;
                    const textHeight = parseInt(ctx.font, 10) * 0.8;
                    const paddingX = 6;
                    const paddingY = 4;
                    
                    // Позиция текста над прямоугольником или внутри верхнего края
                    let textX = x;
                    let textY = y - 6;
                    let bgY = y - textHeight - paddingY * 1.5;
                    // если текст выходит за верхнюю границу, рисуем внутри снизу от рамки
                    if (textY < 0) {
                        textY = y + height + textHeight + 2;
                        bgY = y + height + 2;
                    }
                    
                    // Фон для текста (полупрозрачный черный с легким скруглением)
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(textX - 2, bgY - 2, textWidth + paddingX, textHeight + paddingY);
                    
                    // Сам текст белым, жирный, четкий
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 0;
                    ctx.fillText(displayText, textX, textY + textHeight - 2);
                    
                    // дополнительно можно добавить красный акцентный бордер вокруг текста — опционально
                    ctx.strokeStyle = '#ff4d4d';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(textX - 2, bgY - 2, textWidth + paddingX, textHeight + paddingY);
                }
                
                // Если нет объектов, можно оставить canvas пустым (минимализм)
                if (count === 0 && canvas.width > 0) {
                    // Ничего не рисуем дополнительно, просто прозрачный фон, только рамок нет
                }
            } catch (err) {
                console.warn('Ошибка детекции:', err);
                // Не сбрасываем поток, но показываем на canvas что ошибка? нет, просто лог.
            }
        }
        
        // ----- Цикл детекции (интервальный) -----
        function startDetectionLoop() {
            if (detectionInterval) clearInterval(detectionInterval);
            // Сразу выполняем первое обнаружение
            if (video.readyState >= 2) {
                detectAndDraw();
            }
            detectionInterval = setInterval(() => {
                if (isCameraActive && model && video.readyState === 4 && video.videoWidth > 0) {
                    detectAndDraw();
                } else if (!isCameraActive) {
                    // если камера выключена, чистим canvas и счетчик
                    if (ctx && canvas.width) ctx.clearRect(0, 0, canvas.width, canvas.height);
                    objectCountSpan.innerText = '0';
                }
            }, DETECTION_INTERVAL_MS);
        }
        
        function stopDetectionLoop() {
            if (detectionInterval) {
                clearInterval(detectionInterval);
                detectionInterval = null;
            }
            // Очищаем canvas при остановке
            if (ctx && canvas.width) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            objectCountSpan.innerText = '0';
        }
        
        // ----- Включение камеры (с обработкой разрешений) -----
        async function enableCamera() {
            if (stream) {
                // Если камера уже активна, перезапускаем (на случай ошибок)
                disableCamera();
            }
            
            try {
                // Запрашиваем доступ к веб-камере (идеально для мобильных: используем заднюю/фронтальную по умолчанию)
                const constraints = {
                    video: {
                        facingMode: { ideal: "environment" }, // на мобилках предпочтительнее основная камера, но если нет — любой режим
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                // Но для фронталки чаще лучше "user", но у нас зеркалирование через scaleX, поэтому не страшно
                // Попробуем с расширенными настройками.
                const newStream = await navigator.mediaDevices.getUserMedia(constraints);
                stream = newStream;
                video.srcObject = stream;
                await video.play();
                isCameraActive = true;
                camStatusSpan.innerText = '● камера активна';
                camStatusSpan.classList.add('active');
                
                // Ждём когда видео получит метаданные для размера canvas
                video.addEventListener('loadedmetadata', () => {
                    resizeCanvasToVideo();
                    if (model && !isModelLoading) {
                        startDetectionLoop();
                    } else if (model) {
                        // модель уже готова, начинаем
                        startDetectionLoop();
                    } else {
                        // модель еще грузится, цикл запустится когда модель загрузится (смотри loadDetectionModel)
                    }
                }, { once: true });
                
                // Если видео уже готово
                if (video.videoWidth > 0) {
                    resizeCanvasToVideo();
                    if (model) startDetectionLoop();
                }
                
            } catch (err) {
                console.error('Ошибка доступа к камере:', err);
                let errorMsg = 'Не удалось получить доступ к камере. ';
                if (err.name === 'NotAllowedError') errorMsg += 'Разрешите доступ в настройках браузера.';
                else if (err.name === 'NotFoundError') errorMsg += 'Камера не обнаружена.';
                else errorMsg += 'Проверьте подключение камеры.';
                showTemporaryError(errorMsg);
                camStatusSpan.innerText = '✖ ошибка камеры';
                camStatusSpan.classList.remove('active');
                isCameraActive = false;
                stopDetectionLoop();
            }
        }
        
        // ----- Выключение камеры и очистка -----
        function disableCamera() {
            if (stream) {
                const tracks = stream.getTracks();
                tracks.forEach(track => track.stop());
                stream = null;
            }
            video.srcObject = null;
            isCameraActive = false;
            camStatusSpan.innerText = '⏻ камера выкл';
            camStatusSpan.classList.remove('active');
            stopDetectionLoop();
            // очищаем canvas от рамок
            if (ctx && canvas.width) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            objectCountSpan.innerText = '0';
        }
        
        // ---- Временное сообщение об ошибке (в минималистичном стиле) ----
        let errorTimeout = null;
        function showTemporaryError(message) {
            // Удаляем существующее сообщение если есть
            const existingError = document.querySelector('.error-message');
            if (existingError) existingError.remove();
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerText = message;
            const wrapper = document.querySelector('.camera-wrapper');
            wrapper.style.position = 'relative';
            wrapper.appendChild(errorDiv);
            if (errorTimeout) clearTimeout(errorTimeout);
            errorTimeout = setTimeout(() => {
                if (errorDiv && errorDiv.remove) errorDiv.remove();
            }, 4000);
        }
        
        // ----- Событие при изменении размера окна (мобильная адаптация) -----
        function handleWindowResize() {
            if (video.videoWidth && video.videoHeight && isCameraActive) {
                resizeCanvasToVideo();
                // дополнительный вызов детекции не критичен
                if (model) detectAndDraw();
            }
        }
        
        // ----- Инициализация всего приложения -----
        async function init() {
            // Загружаем мощную модель сразу
            await loadDetectionModel();
            // При клике на кнопку - включаем камеру. Пользователь сам активирует (требование браузера)
            enableBtn.addEventListener('click', () => {
                if (isCameraActive) {
                    disableCamera();
                    enableBtn.innerText = '🎥 включить камеру';
                } else {
                    enableCamera();
                    enableBtn.innerText = '📷 выключить камеру';
                }
            });
            
            // Также на случай, если камера уже была активна, но модель загрузилась позже - стартуем детекцию
            // Проверяем в интервале ожидания готовности модели
            const checkModelAndCam = setInterval(() => {
                if (model && isCameraActive && video.videoWidth > 0 && !detectionInterval) {
                    startDetectionLoop();
                    clearInterval(checkModelAndCam);
                } else if (model && !isCameraActive) {
                    // модель готова, но камера выключена
                    // ничего не делаем
                }
            }, 300);
            
            window.addEventListener('resize', () => {
                setTimeout(handleWindowResize, 100);
            });
            
            // Поддержка touch-событий, чтобы кнопка работала чётко
            enableBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                enableBtn.click();
            });
        }
        
        // Старт приложения
        init();
    })();
</script>
</body>
</html>
