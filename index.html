<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NEURAL SCANNER // CYBERPUNK 2077</title>
  <!-- Font Awesome (иконки) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- TensorFlow.js и модель COCO-SSD (указанные версии) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
  <style>
    /* === СБРОС & КИБЕРПАНК ОСНОВА === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
    }

    body {
      background: #0c0b16;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      position: relative;
      overflow-x: hidden;
    }

    /* Сканирующая сетка фона */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    /* Глитч-линии */
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(255, 0, 255, 0.02) 0px, transparent 2px, rgba(0, 255, 255, 0.02) 4px);
      pointer-events: none;
      z-index: 0;
    }

    .scanner-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 720px;
      border: 3px solid #00ffff;
      border-radius: 24px;
      padding: 18px 18px 22px;
      background: rgba(8, 8, 20, 0.75);
      backdrop-filter: blur(8px);
      box-shadow: 
        0 0 30px rgba(0, 255, 255, 0.3),
        inset 0 0 20px rgba(0, 255, 255, 0.1),
        0 0 0 1px #ff00ff inset;
      transition: box-shadow 0.2s ease;
    }

    /* Заголовок с неоновыми элементами */
    .cyber-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 6px;
      border-bottom: 2px dashed #ff00ff;
      padding-bottom: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-left i {
      font-size: 28px;
      color: #ff00ff;
      text-shadow: 0 0 15px #ff00ff;
    }

    .header-left h1 {
      font-size: 1.7rem;
      font-weight: 400;
      letter-spacing: 4px;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
      text-transform: uppercase;
    }
    /* Адаптация для телефонов */
    @media (max-width: 480px) {
      .header-left h1 {
        font-size: 1.2rem;
        letter-spacing: 2px;
      }
      .header-left i {
        font-size: 22px;
      }
      .scanner-container {
        padding: 12px 12px 18px;
        border-width: 2px;
      }
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f0e1a;
      padding: 6px 14px;
      border-radius: 40px;
      border: 1px solid #00ffff;
      box-shadow: 0 0 10px #00ffff66;
    }

    .status-badge i {
      color: #00ffaa;
      font-size: 12px;
      text-shadow: 0 0 8px #00ffaa;
    }

    .status-badge span {
      color: #b0fffc;
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    /* Видео область */
    .video-wrapper {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid #ff00ff;
      box-shadow: 0 0 30px #ff00ff4d, inset 0 0 15px #00ffff33;
      margin-bottom: 18px;
      aspect-ratio: 16 / 12; /* гибкий, для смартфонов хорошо */
    }

    #webcam {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transform: scaleX(-1); /* зеркалим, чтобы было естественно */
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      transform: scaleX(-1); /* синхронно с видео */
    }

    /* Оверлей с перекрестием сканера */
    .scan-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      border: 1px solid rgba(0, 255, 255, 0.25);
      box-shadow: inset 0 0 40px rgba(0, 255, 255, 0.1);
    }
    .corner {
      position: absolute;
      width: 25px; height: 25px;
      border-color: #00ffff;
      border-style: solid;
      filter: drop-shadow(0 0 8px cyan);
    }
    .corner-tl { top: 10px; left: 10px; border-width: 3px 0 0 3px; }
    .corner-tr { top: 10px; right: 10px; border-width: 3px 3px 0 0; }
    .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 3px 3px; }
    .corner-br { bottom: 10px; right: 10px; border-width: 0 3px 3px 0; }

    /* Панель управления */
    .controls-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .cyber-btn {
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 12px #00ffff66, inset 0 0 5px #00ffff33;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cyber-btn i {
      font-size: 1.1rem;
      color: #ff00ff;
      text-shadow: 0 0 8px #ff00ff;
    }
    .cyber-btn:active {
      background: #00ffff22;
      box-shadow: 0 0 22px #00ffff, inset 0 0 8px white;
      border-color: #ff00ff;
      color: #fff;
    }
    @media (max-width: 480px) {
      .cyber-btn {
        padding: 8px 12px;
        font-size: 0.8rem;
        gap: 5px;
      }
    }

    .fps-counter {
      background: #0f0e1a;
      padding: 6px 16px;
      border-radius: 30px;
      border: 1px solid #ff00ff;
      color: #ffb0ff;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .fps-counter i {
      color: #00ffaa;
    }

    /* Список обнаруженных объектов — киберпанк */
    .detections-panel {
      background: #05040cbb;
      backdrop-filter: blur(5px);
      border: 1px solid #00ffff;
      border-radius: 20px;
      padding: 14px 16px;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: inset 0 0 30px #000000, 0 0 15px #ff00ff33;
    }

    .detections-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: #ff66ff;
      text-shadow: 0 0 5px magenta;
      border-bottom: 1px dashed #00ffff66;
      padding-bottom: 6px;
    }

    #detectionsList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .detection-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #b7f9ff;
      font-size: 1rem;
      border-left: 3px solid #ff00ff;
      padding-left: 12px;
      text-transform: capitalize;
      text-shadow: 0 0 6px cyan;
    }

    .detection-item i {
      width: 20px;
      color: #ff00ff;
    }

    .confidence {
      margin-left: auto;
      font-family: monospace;
      color: #ffffaa;
      background: #1a1f35;
      padding: 2px 10px;
      border-radius: 20px;
      border: 1px solid #00ffff99;
      font-size: 0.8rem;
    }

    /* placeholder */
    .empty-message {
      color: #6f8f9f;
      font-style: italic;
      padding: 6px 0;
    }

    /* скроллбар в стиле киберпанк */
    .detections-panel::-webkit-scrollbar {
      width: 5px;
    }
    .detections-panel::-webkit-scrollbar-thumb {
      background: #ff00ff;
      border-radius: 10px;
      box-shadow: inset 0 0 6px white;
    }
  </style>
</head>
<body>
<div class="scanner-container">
  
  <!-- ХЕДЕР -->
  <div class="cyber-header">
    <div class="header-left">
      <i class="fas fa-eye"></i>
      <h1>OBJ//SCAN</h1>
    </div>
    <div class="status-badge">
      <i class="fas fa-circle"></i>
      <span id="modelStatus">LOADING</span>
    </div>
  </div>

  <!-- ВИДЕО ПОЛЕ -->
  <div class="video-wrapper">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="scan-overlay">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
    </div>
  </div>

  <!-- ПАНЕЛЬ УПРАВЛЕНИЯ -->
  <div class="controls-panel">
    <div class="btn-group">
      <button class="cyber-btn" id="toggleCameraBtn"><i class="fas fa-power-off"></i> <span>ON/OFF</span></button>
      <button class="cyber-btn" id="captureBtn"><i class="fas fa-camera-retro"></i> <span>SNAP</span></button>
    </div>
    <div class="fps-counter">
      <i class="fas fa-microchip"></i>
      <span id="fpsDisplay">-- FPS</span>
    </div>
  </div>

  <!-- БЛОК ОБНАРУЖЕНИЙ -->
  <div class="detections-panel">
    <div class="detections-header">
      <i class="fas fa-radar"></i>
      <span>ACTIVE TARGETS //</span>
      <i class="fas fa-chevron-right" style="font-size: 12px;"></i>
    </div>
    <ul id="detectionsList">
      <li class="empty-message"><i class="fas fa-sync-alt fa-spin"></i> Ожидание камеры...</li>
    </ul>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // DOM элементы
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const detectionsList = document.getElementById('detectionsList');
    const modelStatusSpan = document.getElementById('modelStatus');
    const fpsDisplay = document.getElementById('fpsDisplay');
    const toggleBtn = document.getElementById('toggleCameraBtn');
    const captureBtn = document.getElementById('captureBtn');

    // Переменные состояния
    let model = null;
    let cameraActive = false;
    let stream = null;
    let animationFrame = null;
    let lastPredictTime = 0;
    const PREDICT_INTERVAL_MS = 150; // ограничение частоты детекции для плавности
    let fps = 0;
    let frameCount = 0;
    let lastFpsUpdate = performance.now();

    // Статус модели
    modelStatusSpan.innerText = 'LOADING MODEL...';
    
    // --- Загрузка COCO-SSD ---
    async function loadModel() {
      try {
        model = await cocoSsd.load({
          base: 'mobilenet_v2' // можно 'lite_mobilenet_v2' для скорости, но mobilenet_v2 мощнее
        });
        modelStatusSpan.innerText = 'MODEL READY';
        console.log('COCO-SSD model loaded.');
      } catch (err) {
        modelStatusSpan.innerText = 'MODEL ERROR';
        console.error('Ошибка загрузки модели:', err);
        detectionsList.innerHTML = `<li class="empty-message"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки модели</li>`;
      }
    }

    // --- Инициализация камеры (адаптивная под смартфоны) ---
    async function startCamera() {
      try {
        // Останавливаем предыдущий стрим если есть
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }
        
        const constraints = {
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            facingMode: 'environment' // основная камера (можно 'user' для фронталки)
          },
          audio: false
        };
        
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        // Ждём, пока видео начнёт играть
        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            resolve();
          };
        });
        
        await video.play();
        
        // Устанавливаем размеры canvas под реальное разрешение видео
        const videoWidth = video.videoWidth;
        const videoHeight = video.videoHeight;
        canvas.width = videoWidth;
        canvas.height = videoHeight;
        
        cameraActive = true;
        toggleBtn.innerHTML = '<i class="fas fa-power-off"></i> <span>OFF</span>';
        modelStatusSpan.innerText = model ? 'SCANNING' : 'MODEL LOADING';
        
        // Запускаем цикл детекции
        if (animationFrame) cancelAnimationFrame(animationFrame);
        predictLoop();
        
      } catch (err) {
        console.error('Ошибка доступа к камере:', err);
        cameraActive = false;
        detectionsList.innerHTML = `<li class="empty-message"><i class="fas fa-ban"></i> Нет доступа к камере</li>`;
        toggleBtn.innerHTML = '<i class="fas fa-power-off"></i> <span>ON</span>';
        modelStatusSpan.innerText = 'CAM ERROR';
      }
    }

    // --- Остановка камеры ---
    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
      cameraActive = false;
      toggleBtn.innerHTML = '<i class="fas fa-power-off"></i> <span>ON</span>';
      modelStatusSpan.innerText = model ? 'READY' : 'NO MODEL';
      
      // Очищаем canvas и список
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      detectionsList.innerHTML = `<li class="empty-message"><i class="fas fa-video-slash"></i> Камера выключена</li>`;
      fpsDisplay.innerText = '-- FPS';
      
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
      }
    }

    // --- Основной цикл детекции ---
    function predictLoop() {
      if (!cameraActive || !model) {
        // Если камера неактивна, не продолжаем
        if (cameraActive && !model) {
          // модель ещё грузится
          animationFrame = requestAnimationFrame(predictLoop);
        }
        return;
      }

      async function detectionStep(now) {
        try {
          // Проверяем, готово ли видео
          if (video.readyState === 4) {
            
            // FPS счётчик
            frameCount++;
            const timeSinceLastFps = now - lastFpsUpdate;
            if (timeSinceLastFps >= 500) {
              fps = Math.round((frameCount * 1000) / timeSinceLastFps);
              fpsDisplay.innerText = `${fps} FPS`;
              frameCount = 0;
              lastFpsUpdate = now;
            }

            // Ограничение частоты предсказаний
            if (now - lastPredictTime > PREDICT_INTERVAL_MS) {
              lastPredictTime = now;
              
              // Запускаем детекцию
              const predictions = await model.detect(video);
              
              // Отрисовка рамок и вывод списка
              drawPredictions(predictions);
              updateDetectionsList(predictions);
            } else {
              // Даже если не делаем детекцию, перерисовываем (чтобы не мигало)
              // Но используем последние предсказания? для простоты оставим без изменений.
              // Просто копируем видео на canvas без рамок (рамки хранятся отдельно)
              // Чтобы рамки не пропадали, мы могли бы хранить lastPredictions, но 
              // для плавности не будем усложнять — просто если нет новых, рамки исчезают через 150мс.
              // Это нормально для киберпанк эстетики (глитч эффект)
            }
            
            // В любом случае копируем видео (зеркалим, т.к. canvas уже зеркален стилями)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            // Так как video и canvas оба зеркалятся через CSS, не нужно дополнительно трансформировать
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();
            
          }
        } catch (e) {
          console.warn('Ошибка детекции:', e);
        }
        
        // Продолжаем цикл
        animationFrame = requestAnimationFrame(predictLoop);
      }

      animationFrame = requestAnimationFrame(detectionStep);
    }

    // --- Отрисовка рамок (киберпанк стиль) ---
    function drawPredictions(predictions) {
      // ctx уже содержит кадр видео
      ctx.save();
      // Шрифт для подписей
      ctx.font = 'bold 16px "Share Tech Mono", "Courier New", monospace';
      ctx.textBaseline = 'top';
      ctx.lineWidth = 3;
      
      predictions.forEach(pred => {
        const [x, y, width, height] = pred.bbox;
        
        // Неоновая рамка
        ctx.strokeStyle = '#ff00ff';
        ctx.shadowColor = '#ff00ff';
        ctx.shadowBlur = 15;
        ctx.strokeRect(x, y, width, height);
        
        // Дополнительная тонкая рамка
        ctx.shadowBlur = 8;
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x-1, y-1, width+2, height+2);
        
        // Подпись класса и уверенности
        const label = `${pred.class} ${Math.round(pred.score * 100)}%`;
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#00ffff';
        ctx.fillStyle = '#0c0b16ee';
        ctx.fillRect(x, y - 28, ctx.measureText(label).width + 16, 28);
        
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#00ffff';
        ctx.font = 'bold 14px "Share Tech Mono", monospace';
        ctx.fillText(label, x + 8, y - 22);
        
        // Сброс теней для других элементов
        ctx.shadowBlur = 0;
      });
      ctx.restore();
    }

    // --- Обновление списка объектов ---
    function updateDetectionsList(predictions) {
      if (!predictions || predictions.length === 0) {
        detectionsList.innerHTML = `<li class="empty-message"><i class="fas fa-search"></i> Объекты не найдены...</li>`;
        return;
      }
      
      // Сортируем по уверенности
      const sorted = [...predictions].sort((a, b) => b.score - a.score);
      
      let html = '';
      sorted.slice(0, 10).forEach(pred => { // показываем до 10 объектов
        const icon = getIconForClass(pred.class);
        html += `<li class="detection-item">
                  <i class="${icon}"></i>
                  <span>${pred.class}</span>
                  <span class="confidence">${Math.round(pred.score * 100)}%</span>
                </li>`;
      });
      
      if (sorted.length > 10) {
        html += `<li class="empty-message"><i class="fas fa-ellipsis-h"></i> и ещё ${sorted.length-10}...</li>`;
      }
      
      detectionsList.innerHTML = html;
    }

    // Сопоставление классов и иконок Font Awesome
    function getIconForClass(className) {
      const map = {
        'person': 'fas fa-user',
        'bicycle': 'fas fa-bicycle',
        'car': 'fas fa-car',
        'motorcycle': 'fas fa-motorcycle',
        'airplane': 'fas fa-plane',
        'bus': 'fas fa-bus',
        'train': 'fas fa-train',
        'truck': 'fas fa-truck',
        'boat': 'fas fa-ship',
        'traffic light': 'fas fa-traffic-light',
        'fire hydrant': 'fas fa-fire-extinguisher',
        'stop sign': 'fas fa-stop',
        'parking meter': 'fas fa-parking',
        'bench': 'fas fa-chair',
        'bird': 'fas fa-dove',
        'cat': 'fas fa-cat',
        'dog': 'fas fa-dog',
        'horse': 'fas fa-horse',
        'sheep': 'fas fa-sheep',
        'cow': 'fas fa-cow',
        'elephant': 'fas fa-elephant',
        'bear': 'fas fa-paw',
        'zebra': 'fas fa-hippo', // близко
        'giraffe': 'fas fa-giraffe',
        'backpack': 'fas fa-bag-shopping',
        'umbrella': 'fas fa-umbrella',
        'handbag': 'fas fa-bag-shopping',
        'tie': 'fas fa-tie',
        'suitcase': 'fas fa-suitcase',
        'frisbee': 'fas fa-compact-disc',
        'skis': 'fas fa-skiing',
        'snowboard': 'fas fa-snowboarding',
        'sports ball': 'fas fa-futbol',
        'kite': 'fas fa-kite',
        'baseball bat': 'fas fa-baseball-bat',
        'baseball glove': 'fas fa-baseball',
        'skateboard': 'fas fa-skateboard',
        'surfboard': 'fas fa-surfboard',
        'tennis racket': 'fas fa-table-tennis',
        'bottle': 'fas fa-bottle-water',
        'wine glass': 'fas fa-wine-glass',
        'cup': 'fas fa-mug-hot',
        'fork': 'fas fa-utensils',
        'knife': 'fas fa-utensils',
        'spoon': 'fas fa-spoon',
        'bowl': 'fas fa-bowl-food',
        'banana': 'fas fa-apple', // условно
        'apple': 'fas fa-apple',
        'sandwich': 'fas fa-burger',
        'orange': 'fas fa-citrus',
        'broccoli': 'fas fa-seedling',
        'carrot': 'fas fa-carrot',
        'hot dog': 'fas fa-hotdog',
        'pizza': 'fas fa-pizza-slice',
        'donut': 'fas fa-circle',
        'cake': 'fas fa-cake-candles',
        'chair': 'fas fa-chair',
        'couch': 'fas fa-couch',
        'potted plant': 'fas fa-leaf',
        'bed': 'fas fa-bed',
        'dining table': 'fas fa-table',
        'toilet': 'fas fa-toilet',
        'tv': 'fas fa-tv',
        'laptop': 'fas fa-laptop',
        'mouse': 'fas fa-computer-mouse',
        'remote': 'fas fa-gamepad',
        'keyboard': 'fas fa-keyboard',
        'cell phone': 'fas fa-mobile-screen',
        'microwave': 'fas fa-oven',
        'oven': 'fas fa-temperature-high',
        'toaster': 'fas fa-bread-slice',
        'sink': 'fas fa-sink',
        'refrigerator': 'fas fa-icicles',
        'book': 'fas fa-book',
        'clock': 'fas fa-clock',
        'vase': 'fas fa-vial',
        'scissors': 'fas fa-cut',
        'teddy bear': 'fas fa-bear',
        'hair drier': 'fas fa-wind',
        'toothbrush': 'fas fa-tooth'
      };
      return map[className.toLowerCase()] || 'fas fa-microchip';
    }

    // --- Снимок (скриншот с рамками) ---
    function takeSnapshot() {
      if (!cameraActive) {
        alert('Включите камеру (POWER ON)');
        return;
      }
      // Создаём временную ссылку
      const dataURL = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = `cyber_scan_${Date.now()}.png`;
      link.href = dataURL;
      link.click();
    }

    // --- Переключение камеры ---
    function toggleCamera() {
      if (cameraActive) {
        stopCamera();
      } else {
        startCamera();
      }
    }

    // --- Инициализация ---
    async function init() {
      await loadModel();
      // Автозапуск камеры? лучше по кнопке, но можно и сразу
      // Для удобства сразу запустим камеру
      startCamera();
      
      // Навешиваем обработчики
      toggleBtn.addEventListener('click', toggleCamera);
      captureBtn.addEventListener('click', takeSnapshot);
    }

    init().catch(e => console.error(e));

    // Обработка изменения ориентации — canvas размер подстроится
    window.addEventListener('resize', () => {
      if (cameraActive && video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
      }
    });

  })();
</script>
</body>
</html>
