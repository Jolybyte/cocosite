<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>// CYBERPUNK 2077 // NEURAL SCAN //</title>
  <meta name="description" content="Arasaka Neural Scanner - Real-time object detection interface">
  <meta name="theme-color" content="#ff0000">
  
  <!-- TensorFlow.js и COCO-SSD -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0a05;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      padding: 10px;
      background-image: 
        repeating-linear-gradient(0deg, rgba(255, 0, 0, 0.03) 0px, transparent 2px),
        repeating-linear-gradient(90deg, rgba(255, 200, 0, 0.02) 0px, transparent 3px);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 30% 40%, rgba(255, 50, 0, 0.08), transparent 60%);
      pointer-events: none;
    }

    /* Главный контейнер в стиле киберимпланта */
    .cyberdeck {
      max-width: 950px;
      width: 100%;
      background: linear-gradient(135deg, #0f0a05 0%, #1a0f08 100%);
      border: 3px solid;
      border-image: repeating-linear-gradient(45deg, #ff0000, #ff4400, #ff0000) 30;
      box-shadow: 
        0 0 60px rgba(255, 0, 0, 0.5),
        inset 0 0 40px rgba(255, 0, 0, 0.1),
        0 0 0 2px #ffcc00 inset;
      padding: 20px 18px 24px;
      display: flex;
      flex-direction: column;
      clip-path: polygon(0% 0%, 100% 0%, 100% 95%, 96% 100%, 0% 100%);
      position: relative;
    }

    /* Декоративные болты */
    .cyberdeck::before,
    .cyberdeck::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border: 3px solid #ffcc00;
      box-shadow: 0 0 15px #ff0000;
    }
    .cyberdeck::before { top: -8px; left: 20px; border-right: none; border-bottom: none; }
    .cyberdeck::after { bottom: -8px; right: 20px; border-left: none; border-top: none; }

    /* Шапка в стиле интерфейса */
    .interface-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 3px solid #ff0000;
      padding-bottom: 12px;
      margin-bottom: 20px;
      position: relative;
    }

    .interface-header::after {
      content: '';
      position: absolute;
      bottom: -5px; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, #ffcc00, #ff0000, #ffcc00);
      filter: blur(2px);
    }

    .title-block {
      display: flex;
      flex-direction: column;
    }

    .corp-label {
      color: #ffcc00;
      font-size: 0.8rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-weight: 600;
      text-shadow: 0 0 10px #ffcc00;
    }

    .main-title {
      font-size: 2.4rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #ff0000;
      text-shadow: 
        0 0 30px #ff0000,
        0 0 60px #ff4400,
        2px 2px 0 #8b0000;
      letter-spacing: 8px;
      line-height: 1;
      font-style: italic;
      transform: skew(-5deg);
    }

    .status-tag {
      background: #1a0a00;
      border: 2px solid #ffcc00;
      padding: 8px 18px;
      color: #ffcc00;
      font-weight: 700;
      letter-spacing: 3px;
      clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
      font-size: 0.9rem;
    }

    /* Область сканирования */
    .scan-module {
      position: relative;
      border: 3px solid #ff0000;
      background: #000;
      margin-bottom: 18px;
      box-shadow: 
        0 0 50px rgba(255, 0, 0, 0.4),
        inset 0 0 60px rgba(0, 0, 0, 0.9);
      clip-path: polygon(0% 0%, 100% 0%, 100% 92%, 96% 100%, 0% 100%);
    }

    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
    }

    @media (max-width: 480px) {
      .video-container { aspect-ratio: auto; min-height: 280px; }
      .main-title { font-size: 1.8rem; letter-spacing: 4px; }
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: contrast(1.3) brightness(0.9) saturate(1.5) sepia(0.2);
    }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* Голографический прицел */
    .holo-reticle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120px; height: 120px;
      border: 1px solid rgba(255, 0, 0, 0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
    }

    .holo-reticle::before,
    .holo-reticle::after {
      content: '';
      position: absolute;
      background: rgba(255, 0, 0, 0.6);
    }
    .holo-reticle::before {
      width: 100%; height: 1px;
      top: 50%;
      box-shadow: 0 0 20px #ff0000;
    }
    .holo-reticle::after {
      width: 1px; height: 100%;
      left: 50%;
      box-shadow: 0 0 20px #ff0000;
    }

    /* Сканирующая строка */
    .scan-beam {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #ff0000, #ffcc00, #ff0000, transparent);
      box-shadow: 0 0 30px #ff0000;
      opacity: 0.8;
      animation: scanDown 3s ease-in-out infinite;
      pointer-events: none;
      z-index: 4;
    }

    @keyframes scanDown {
      0% { top: -5px; opacity: 0.9; }
      80% { opacity: 0.5; }
      100% { top: 100%; opacity: 0; }
    }

    /* Угловые маркеры */
    .corner-marker {
      position: absolute;
      width: 40px; height: 40px;
      border-color: #ff0000;
      border-style: solid;
      filter: drop-shadow(0 0 12px #ff0000);
      z-index: 3;
    }
    .tl { top: 10px; left: 10px; border-width: 4px 0 0 4px; }
    .tr { top: 10px; right: 10px; border-width: 4px 4px 0 0; }
    .bl { bottom: 10px; left: 10px; border-width: 0 0 4px 4px; }
    .br { bottom: 10px; right: 10px; border-width: 0 4px 4px 0; }

    /* Загрузочный экран в стиле Arasaka */
    .boot-sequence {
      position: absolute;
      inset: 0;
      background: #0a0500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
      border: 2px solid #ff0000;
    }

    .arasaka-logo {
      font-size: 3rem;
      font-weight: 700;
      color: #ff0000;
      text-shadow: 0 0 40px #ff0000;
      letter-spacing: 15px;
      margin-bottom: 30px;
      animation: pulseRed 2s infinite;
    }

    @keyframes pulseRed {
      0%, 100% { opacity: 1; text-shadow: 0 0 40px #ff0000; }
      50% { opacity: 0.7; text-shadow: 0 0 80px #ff0000; }
    }

    .boot-text {
      color: #ffcc00;
      font-size: 1.2rem;
      letter-spacing: 8px;
      margin-bottom: 20px;
    }

    .progress-track {
      width: 260px; height: 4px;
      background: #2a1500;
      border: 1px solid #ff0000;
    }

    .progress-fill {
      width: 75%; height: 100%;
      background: linear-gradient(90deg, #ff0000, #ffcc00);
      box-shadow: 0 0 20px #ff0000;
      animation: glitchProgress 1.5s infinite;
    }

    @keyframes glitchProgress {
      0%, 100% { width: 75%; }
      50% { width: 80%; opacity: 0.8; }
    }

    /* Панель данных */
    .data-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(90deg, #1a0a00 0%, #0d0500 100%);
      border: 2px solid #ffcc00;
      padding: 12px 20px;
      margin: 10px 0 16px;
      clip-path: polygon(0% 0%, 100% 0%, 98% 100%, 0% 100%);
      box-shadow: inset 0 0 20px #000, 0 0 30px rgba(255, 0, 0, 0.3);
    }

    .data-label {
      color: #ffcc00;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .data-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #ff0000;
      text-shadow: 0 0 30px #ff0000;
      font-family: 'Rajdhani', sans-serif;
      line-height: 1;
    }

    /* Терминал обнаружений */
    .target-terminal {
      background: #0a0300;
      border: 2px solid #ff0000;
      padding: 14px 12px;
      margin-bottom: 20px;
      min-height: 100px;
      max-height: 140px;
      overflow-y: auto;
      box-shadow: inset 0 0 40px #000, 0 0 20px rgba(255, 0, 0, 0.2);
      scrollbar-width: thin;
      scrollbar-color: #ff0000 #1a0a00;
    }

    .target-tag {
      display: inline-block;
      background: #1a0500;
      border-left: 6px solid #ff0000;
      border-bottom: 2px solid #ffcc00;
      padding: 8px 18px;
      margin: 5px;
      color: #ffcc00;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.9rem;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
      clip-path: polygon(0% 0%, 95% 0%, 100% 100%, 0% 100%);
    }

    .no-targets {
      color: #663300;
      padding: 12px;
      font-style: italic;
      text-transform: uppercase;
    }

    /* Панель управления */
    .control-deck {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      flex-wrap: wrap;
    }

    .sys-indicator {
      display: flex;
      align-items: center;
      gap: 15px;
      background: #0a0300;
      padding: 8px 22px;
      border: 2px solid #ffcc00;
      clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
    }

    .led-red {
      width: 18px; height: 18px;
      background: #ff0000;
      border-radius: 50%;
      box-shadow: 0 0 25px #ff0000;
      animation: blinkRed 1.5s infinite;
    }

    .led-red.off {
      background: #4a0000;
      box-shadow: none;
      animation: none;
    }

    @keyframes blinkRed {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn-cyber {
      background: transparent;
      border: 3px solid #ff0000;
      color: #ff0000;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      padding: 12px 28px;
      font-size: 1.1rem;
      letter-spacing: 4px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
      transition: 0.1s;
      clip-path: polygon(8% 0%, 100% 0%, 92% 100%, 0% 100%);
      background: rgba(255, 0, 0, 0.05);
    }

    .btn-cyber.scan-btn {
      border-color: #ffcc00;
      color: #ffcc00;
      box-shadow: 0 0 30px rgba(255, 200, 0, 0.5);
      background: rgba(255, 200, 0, 0.05);
    }

    .btn-cyber:active {
      transform: scale(0.96);
      background: rgba(255, 0, 0, 0.2);
      box-shadow: 0 0 50px #ff0000;
    }

    .btn-cyber:disabled {
      opacity: 0.3;
      pointer-events: none;
      filter: grayscale(0.7);
    }

    #camStatusText {
      color: #ffcc00;
      font-weight: 600;
      letter-spacing: 2px;
    }

    /* Адаптация */
    @media (max-width: 500px) {
      .btn-cyber { padding: 10px 16px; font-size: 0.9rem; }
      .data-value { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<div class="cyberdeck">
  
  <!-- Шапка -->
  <div class="interface-header">
    <div class="title-block">
      <span class="corp-label">// ARASAKA //</span>
      <div class="main-title">Kiroshi Scan</div>
    </div>
    <div class="status-tag">OPTICS v2.0</div>
  </div>

  <!-- Модуль сканирования -->
  <div class="scan-module">
    <div class="video-container">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      
      <!-- HUD элементы -->
      <div class="holo-reticle"></div>
      <div class="scan-beam"></div>
      <div class="corner-marker tl"></div>
      <div class="corner-marker tr"></div>
      <div class="corner-marker bl"></div>
      <div class="corner-marker br"></div>
    </div>

    <!-- Загрузка -->
    <div id="bootScreen" class="boot-sequence">
      <div class="arasaka-logo">ARASAKA</div>
      <div class="boot-text">NEURAL LINK INIT</div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
      <div style="color:#ffcc00; margin-top: 25px; letter-spacing: 3px;">COCO-SSD v2.2</div>
    </div>
  </div>

  <!-- Данные -->
  <div class="data-panel">
    <span class="data-label">[ TARGETS ACQUIRED ]</span>
    <span class="data-value" id="objectCount">00</span>
  </div>

  <!-- Терминал целей -->
  <div class="target-terminal" id="targetTerminal">
    <div class="no-targets">> NO HOSTILES DETECTED_</div>
  </div>

  <!-- Управление -->
  <div class="control-deck">
    <div class="sys-indicator">
      <span class="led-red off" id="camLed"></span>
      <span id="camStatusText">SYS.OFFLINE</span>
    </div>
    <div style="display: flex; gap: 12px;">
      <button class="btn-cyber" id="toggleCamBtn">[ POWER ]</button>
      <button class="btn-cyber scan-btn" id="detectBtn" disabled>⟳ ANALYZE</button>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // DOM элементы
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const bootScreen = document.getElementById('bootScreen');
    const camLed = document.getElementById('camLed');
    const camStatusText = document.getElementById('camStatusText');
    const toggleCamBtn = document.getElementById('toggleCamBtn');
    const detectBtn = document.getElementById('detectBtn');
    const objectCountSpan = document.getElementById('objectCount');
    const terminalDiv = document.getElementById('targetTerminal');

    // Состояние
    let model = null;
    let isModelReady = false;
    let stream = null;
    let isCameraActive = false;
    let detectionInterval = null;
    let isDetecting = false;
    let lastDetections = [];

    // UI
    function updateCameraUI(active) {
      if (active) {
        camLed.className = 'led-red';
        camStatusText.textContent = 'OPTICS.ONLINE';
        toggleCamBtn.innerHTML = '[ SHUTDOWN ]';
      } else {
        camLed.className = 'led-red off';
        camStatusText.textContent = 'SYS.OFFLINE';
        toggleCamBtn.innerHTML = '[ POWER ]';
      }
    }

    function setModelReady(ready) {
      isModelReady = ready;
      if (ready) {
        bootScreen.style.opacity = '0';
        setTimeout(() => { bootScreen.style.display = 'none'; }, 500);
      } else {
        bootScreen.style.display = 'flex';
        bootScreen.style.opacity = '1';
      }
    }

    function updateTerminal(detections) {
      const count = detections.length;
      objectCountSpan.textContent = count.toString().padStart(2, '0');
      
      if (count === 0) {
        terminalDiv.innerHTML = '<div class="no-targets">> NO HOSTILES DETECTED_</div>';
        return;
      }
      
      const sorted = [...detections].sort((a,b) => b.score - a.score);
      let html = '';
      for (let i = 0; i < Math.min(sorted.length, 12); i++) {
        const d = sorted[i];
        const percent = Math.round(d.score * 100);
        html += `<span class="target-tag">◈ ${d.class} [${percent}%]</span>`;
      }
      if (sorted.length > 12) {
        html += `<span class="target-tag">+${sorted.length-12} MORE</span>`;
      }
      terminalDiv.innerHTML = html;
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      video.srcObject = null;
      isCameraActive = false;
      updateCameraUI(false);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      lastDetections = [];
      updateTerminal([]);
      detectBtn.disabled = true;
      stopDetectionLoop();
    }

    function stopDetectionLoop() {
      if (detectionInterval) {
        clearInterval(detectionInterval);
        detectionInterval = null;
      }
      isDetecting = false;
    }

    async function startCamera() {
      if (isCameraActive) return true;
      try {
        const constraints = { 
          video: { 
            facingMode: 'environment', 
            width: { ideal: 1280 }, 
            height: { ideal: 720 } 
          }, 
          audio: false 
        };
        let s;
        try { 
          s = await navigator.mediaDevices.getUserMedia(constraints); 
        } catch { 
          constraints.video.facingMode = undefined; 
          s = await navigator.mediaDevices.getUserMedia(constraints); 
        }
        stream = s;
        video.srcObject = stream;
        await new Promise(r => { 
          video.onloadedmetadata = () => { 
            video.play().then(r).catch(r); 
          }; 
          if (video.readyState >= 2) video.play().then(r).catch(r); 
        });
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        isCameraActive = true;
        updateCameraUI(true);
        if (isModelReady) detectBtn.disabled = false;
        return true;
      } catch (e) {
        alert('[!] OPTICS ACCESS DENIED');
        return false;
      }
    }

    // КРАСНАЯ КИБЕРПАНК ОБВОДКА
    async function detectFrame() {
      if (!isCameraActive || !model || !video.videoWidth) return;
      if (isDetecting) return;
      isDetecting = true;
      
      try {
        const predictions = await model.detect(video);
        lastDetections = predictions;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Настройка стиля КРАСНЫЙ КИБЕРПАНК
        ctx.shadowBlur = 25;
        ctx.shadowColor = '#ff0000';
        ctx.lineWidth = 4;
        ctx.font = 'bold 16px "Rajdhani", monospace';
        ctx.textBaseline = 'top';
        
        for (let p of predictions) {
          const [x, y, w, h] = p.bbox;
          
          // Внешняя красная рамка
          ctx.strokeStyle = '#ff0000';
          ctx.shadowColor = '#ff0000';
          ctx.lineWidth = 5;
          ctx.strokeRect(x, y, w, h);
          
          // Внутренняя желтая рамка (как в игре)
          ctx.strokeStyle = '#ffcc00';
          ctx.shadowColor = '#ffcc00';
          ctx.lineWidth = 2;
          ctx.strokeRect(x-2, y-2, w+4, h+4);
          
          // Угловые акценты
          ctx.shadowBlur = 20;
          ctx.shadowColor = '#ff0000';
          ctx.beginPath();
          ctx.moveTo(x, y+15); ctx.lineTo(x, y); ctx.lineTo(x+15, y);
          ctx.strokeStyle = '#ff0000';
          ctx.lineWidth = 4;
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(x+w-15, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+15);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(x, y+h-15); ctx.lineTo(x, y+h); ctx.lineTo(x+15, y+h);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(x+w-15, y+h); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w, y+h-15);
          ctx.stroke();
          
          // Подложка текста
          ctx.shadowBlur = 15;
          ctx.fillStyle = '#0a0000';
          ctx.globalAlpha = 0.9;
          const label = `◈ ${p.class} ${Math.round(p.score*100)}%`;
          const textW = ctx.measureText(label).width + 24;
          ctx.fillRect(x, y-38, textW, 32);
          ctx.globalAlpha = 1.0;
          
          // Текст
          ctx.fillStyle = '#ffcc00';
          ctx.shadowColor = '#ff0000';
          ctx.font = 'bold 15px "Rajdhani", sans-serif';
          ctx.fillText(label, x+12, y-32);
        }
        
        ctx.shadowBlur = 0;
        updateTerminal(predictions);
        
      } catch (e) { 
        console.warn('Scan error:', e); 
      } finally { 
        isDetecting = false; 
      }
    }

    function startScan() {
      if (!isCameraActive) { 
        alert('[!] POWER ON OPTICS FIRST'); 
        return; 
      }
      if (!model) { 
        alert('[!] NEURAL NET OFFLINE'); 
        return; 
      }
      stopDetectionLoop();
      detectFrame();
      detectionInterval = setInterval(() => detectFrame(), 150);
    }

    async function toggleCamera() {
      if (isCameraActive) { 
        stopCamera(); 
        stopDetectionLoop(); 
      } else { 
        if (!isModelReady) { 
          alert('NEURAL LINK ESTABLISHING...'); 
          return; 
        }
        await startCamera(); 
      }
    }

    async function loadModel() {
      try {
        model = await cocoSsd.load({ base: 'mobilenet_v2' });
        setModelReady(true);
        if (isCameraActive) detectBtn.disabled = false;
      } catch (err) {
        bootScreen.innerHTML = '<div style="color:#ff0000">LINK FAILURE</div>';
        console.error(err);
      }
    }

    function bindEvents() {
      toggleCamBtn.addEventListener('click', toggleCamera);
      detectBtn.addEventListener('click', startScan);
      window.addEventListener('resize', () => {
        if (isCameraActive && video.videoWidth) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        }
      });
    }

    function init() {
      bindEvents();
      loadModel();
      detectBtn.disabled = true;
      updateCameraUI(false);
    }
    
    init();
  })();
</script>
</body>
</html>
