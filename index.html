<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Обнаружение объектов + Жесты зумирования · COCO-SSD</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      position: relative;
    }

    /* Зона камеры — с поддержкой жестов */
    .camera-container {
      flex: 1;
      position: relative;
      width: 100%;
      background: #f5f5f5;
      overflow: hidden;
      border-radius: 0;
      touch-action: none;  /* предотвращаем скролл страницы при жестах */
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform-origin: center center;
      will-change: transform;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      z-index: 10;
      transform-origin: center center;
      will-change: transform;
    }

    /* Индикатор зума — минималистичный */
    .zoom-indicator {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 500;
      color: #1a1a1a;
      letter-spacing: 0.3px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      border: 0.5px solid rgba(0,0,0,0.05);
      z-index: 25;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }

    .zoom-indicator.visible {
      opacity: 1;
    }

    /* Панель управления — лёгкая */
    .controls {
      padding: 18px 22px 22px;
      background: #ffffff;
      border-top: 1px solid #eaeaea;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 20;
    }

    .status-area {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 450;
      color: #555;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 10px;
      background: #ddd;
      transition: background 0.2s;
    }

    .dot.active {
      background: #ff3b30;
      box-shadow: 0 0 8px rgba(255, 59, 48, 0.25);
    }

    .dot.loading {
      background: #f39c12;
    }

    button {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      color: #1a1a1a;
      font-size: 15px;
      font-weight: 480;
      padding: 12px 24px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      min-width: 120px;
      text-align: center;
      backdrop-filter: blur(5px);
    }

    button:active {
      background: #f5f5f5;
      transform: scale(0.97);
      border-color: #ccc;
    }

    button:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .hint {
      font-size: 14px;
      color: #888;
      white-space: nowrap;
    }

    .reset-zoom-btn {
      background: #f0f0f0;
      border: 1px solid #ddd;
      padding: 10px 18px;
      margin-left: 8px;
      min-width: auto;
      font-size: 15px;
    }

    /* Загрузка модели — светлый оверлей */
    .loader-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    .loader-message {
      background: rgba(255,255,255,0.9);
      padding: 22px 36px;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 420;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 0.5px solid #ddd;
      color: #333;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.04);
    }

    /* Адаптация */
    @media (max-width: 480px) {
      .controls {
        padding: 14px 16px 18px;
      }
      button {
        padding: 12px 18px;
        font-size: 14px;
      }
      .hint {
        display: none;
      }
      .reset-zoom-btn {
        padding: 10px 14px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
</head>
<body>
<div class="app">
  <div class="loader-overlay" id="loaderOverlay">
    <div class="loader-message">Загрузка модели COCO-SSD…</div>
  </div>

  <div class="camera-container" id="cameraContainer">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="zoom-indicator" id="zoomIndicator">🔍 1.0x</div>
  </div>

  <div class="controls">
    <div class="status-area">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Ожидание</span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      <span class="hint" id="objectsCount">—</span>
      <button id="resetZoomBtn" class="reset-zoom-btn" title="Сбросить зум">⟲ 1x</button>
      <button id="toggleCameraBtn">▶ Включить</button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- DOM элементы ----------
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const toggleBtn = document.getElementById('toggleCameraBtn');
    const resetZoomBtn = document.getElementById('resetZoomBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const objectsCountSpan = document.getElementById('objectsCount');
    const loaderOverlay = document.getElementById('loaderOverlay');
    const cameraContainer = document.getElementById('cameraContainer');
    const zoomIndicator = document.getElementById('zoomIndicator');

    // ---------- Состояния ----------
    let model = null;
    let stream = null;
    let isDetecting = false;
    let detectionFrameId = null;
    let lastDetectionTime = 0;
    const DETECTION_INTERVAL_MS = 120;
    
    // Переменные для жестов зума
    let currentZoom = 1.0;
    const MIN_ZOOM = 1.0;
    const MAX_ZOOM = 4.0;
    let initialDistance = 0;
    let initialZoom = 1.0;
    let zoomIndicatorTimeout = null;
    
    // Настройки камеры
    const constraints = {
      video: {
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    };

    // ---------- Обновление UI статуса ----------
    function setStatus(type, message) {
      statusText.textContent = message;
      statusDot.className = 'dot';
      if (type === 'active') statusDot.classList.add('active');
      else if (type === 'loading') statusDot.classList.add('loading');
    }

    function hideLoader() {
      if (loaderOverlay) {
        loaderOverlay.style.opacity = '0';
        setTimeout(() => loaderOverlay.style.display = 'none', 400);
      }
    }

    // ---------- Управление зумом ----------
    function applyZoom(zoomValue) {
      // Ограничиваем диапазон
      zoomValue = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoomValue));
      currentZoom = zoomValue;
      
      // Применяем трансформацию к видео и канвасу
      video.style.transform = `scale(${currentZoom})`;
      canvas.style.transform = `scale(${currentZoom})`;
      
      // Показываем индикатор
      zoomIndicator.textContent = `🔍 ${currentZoom.toFixed(1)}x`;
      zoomIndicator.classList.add('visible');
      
      // Скрываем индикатор через 1.5 секунды
      if (zoomIndicatorTimeout) clearTimeout(zoomIndicatorTimeout);
      zoomIndicatorTimeout = setTimeout(() => {
        zoomIndicator.classList.remove('visible');
      }, 1500);
    }

    function resetZoom() {
      applyZoom(1.0);
    }

    // ---------- Обработчики жестов (Pinch-to-Zoom) ----------
    function handleTouchStart(e) {
      if (!stream) return; // только когда камера активна
      
      const touches = e.touches;
      if (touches.length === 2) {
        e.preventDefault();
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        initialDistance = Math.sqrt(dx * dx + dy * dy);
        initialZoom = currentZoom;
      }
    }

    function handleTouchMove(e) {
      if (!stream) return;
      
      const touches = e.touches;
      if (touches.length === 2) {
        e.preventDefault();
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (initialDistance > 0) {
          const scale = distance / initialDistance;
          const newZoom = initialZoom * scale;
          applyZoom(newZoom);
        }
      }
    }

    function handleTouchEnd(e) {
      if (!stream) return;
      initialDistance = 0;
    }

    // ---------- Загрузка модели ----------
    async function loadModel() {
      setStatus('loading', 'Загрузка модели...');
      try {
        model = await cocoSsd.load();
        setStatus('', 'Модель готова');
        console.log('COCO-SSD модель загружена');
        hideLoader();
        toggleBtn.disabled = false;
        toggleBtn.textContent = '▶ Включить';
        statusDot.classList.remove('loading');
        statusDot.classList.add('active');
        setStatus('active', 'Готово к запуску');
        return true;
      } catch (err) {
        console.error('Ошибка загрузки модели:', err);
        setStatus('', 'Ошибка модели');
        statusDot.style.background = '#ff3b30';
        statusText.textContent = 'Ошибка загрузки';
        toggleBtn.disabled = true;
        hideLoader();
        alert('Не удалось загрузить модель COCO-SSD.');
        return false;
      }
    }

    // ---------- Остановка камеры ----------
    function stopCameraAndDetection() {
      if (detectionFrameId) {
        cancelAnimationFrame(detectionFrameId);
        detectionFrameId = null;
      }
      isDetecting = false;
      
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      
      if (video.srcObject) video.srcObject = null;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      objectsCountSpan.textContent = '—';
      setStatus('', 'Камера выключена');
      statusDot.classList.remove('active');
      
      // Сбрасываем зум
      resetZoom();
      
      // Убираем слушатели жестов
      cameraContainer.removeEventListener('touchstart', handleTouchStart);
      cameraContainer.removeEventListener('touchmove', handleTouchMove);
      cameraContainer.removeEventListener('touchend', handleTouchEnd);
    }

    // ---------- Запуск камеры ----------
    async function startCamera() {
      try {
        setStatus('loading', 'Доступ к камере...');
        statusDot.classList.add('loading');
        
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        await new Promise((resolve) => {
          video.onloadedmetadata = () => {
            video.play().then(resolve).catch((e) => {
              console.warn('Автовоспроизведение:', e);
              resolve();
            });
          };
        });
        
        const videoWidth = video.videoWidth;
        const videoHeight = video.videoHeight;
        canvas.width = videoWidth;
        canvas.height = videoHeight;
        
        setStatus('active', 'Камера активна');
        statusDot.classList.add('active');
        statusDot.classList.remove('loading');
        
        toggleBtn.textContent = '■ Остановить';
        objectsCountSpan.textContent = '0 объектов';
        
        // Включаем слушатели жестов
        cameraContainer.addEventListener('touchstart', handleTouchStart, { passive: false });
        cameraContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
        cameraContainer.addEventListener('touchend', handleTouchEnd);
        cameraContainer.addEventListener('touchcancel', handleTouchEnd);
        
        // Сбрасываем зум при старте
        resetZoom();
        
        isDetecting = true;
        detectionLoop();
        
        return true;
      } catch (err) {
        console.error('Ошибка доступа к камере:', err);
        setStatus('', 'Нет доступа');
        statusDot.classList.remove('loading', 'active');
        statusText.textContent = 'Ошибка камеры';
        toggleBtn.textContent = '↻ Повторить';
        alert('Не удалось получить доступ к камере.');
        return false;
      }
    }

    // ---------- Цикл обнаружения объектов ----------
    function detectionLoop() {
      if (!isDetecting) return;
      
      const now = performance.now();
      
      if (video.readyState === 4 && model) {
        if (now - lastDetectionTime > DETECTION_INTERVAL_MS) {
          lastDetectionTime = now;
          
          model.detect(video).then(predictions => {
            if (!isDetecting) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            ctx.font = 'bold 16px "Inter", -apple-system, sans-serif';
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#ff2a2a';
            ctx.fillStyle = '#ff2a2a';
            ctx.shadowColor = '#00000040';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 1;
            
            predictions.forEach(pred => {
              const [x, y, width, height] = pred.bbox;
              const text = `${pred.class} (${Math.round(pred.score * 100)}%)`;
              
              ctx.strokeRect(x, y, width, height);
              
              ctx.fillStyle = '#ff2a2a';
              ctx.shadowBlur = 6;
              const textWidth = ctx.measureText(text).width;
              const textHeight = 22;
              ctx.fillRect(x, y - textHeight - 4, textWidth + 12, textHeight + 4);
              
              ctx.fillStyle = '#ffffff';
              ctx.shadowBlur = 6;
              ctx.font = 'bold 15px "Inter", -apple-system, sans-serif';
              ctx.fillText(text, x + 6, y - 8);
            });
            
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            const count = predictions.length;
            objectsCountSpan.textContent = `${count} объект${getPlural(count)}`;
          }).catch(err => console.warn('Ошибка детекции:', err));
        }
      }
      
      detectionFrameId = requestAnimationFrame(detectionLoop);
    }

    function getPlural(n) {
      const mod10 = n % 10;
      const mod100 = n % 100;
      if (mod10 === 1 && mod100 !== 11) return '';
      else if ([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return 'а';
      else return 'ов';
    }

    // ---------- Обработчик кнопки ВКЛ/ВЫКЛ ----------
    async function onToggleCamera() {
      if (stream) {
        stopCameraAndDetection();
        toggleBtn.textContent = '▶ Включить';
        objectsCountSpan.textContent = '—';
      } else {
        toggleBtn.disabled = true;
        toggleBtn.textContent = '...';
        
        const success = await startCamera();
        if (!success) {
          toggleBtn.disabled = false;
          toggleBtn.textContent = '▶ Включить';
        } else {
          toggleBtn.disabled = false;
        }
      }
    }

    // ---------- Инициализация ----------
    async function initApp() {
      toggleBtn.disabled = true;
      toggleBtn.textContent = 'Загрузка...';
      setStatus('loading', 'Загрузка модели');
      
      const modelLoaded = await loadModel();
      if (modelLoaded) {
        toggleBtn.disabled = false;
        toggleBtn.textContent = '▶ Включить';
        setStatus('', 'Готово');
        statusDot.classList.add('active');
      } else {
        toggleBtn.textContent = 'Ошибка';
      }
      
      toggleBtn.addEventListener('click', onToggleCamera);
      resetZoomBtn.addEventListener('click', resetZoom);
      
      window.addEventListener('beforeunload', () => {
        if (stream) stream.getTracks().forEach(t => t.stop());
      });
      
      window.addEventListener('resize', () => {
        if (video.videoWidth && video.videoHeight) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        }
      });
    }

    initApp();
  })();
</script>
</body>
</html>
